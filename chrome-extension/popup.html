<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Loading state -->
  <div id="loading" class="loading">Loading...</div>

  <!-- Main app -->
  <div id="app" style="display:none">

    <!-- Header (matches site sidebar) -->
    <div class="header">
      <svg class="header-logo" viewBox="0 0 64 64" width="22" height="22">
        <g fill="#ea7c28">
          <rect x="16" y="36" width="8" height="16" rx="2"/>
          <rect x="28" y="24" width="8" height="28" rx="2"/>
          <rect x="40" y="12" width="8" height="40" rx="2"/>
        </g>
      </svg>
      <span class="header-title">Talli</span>
      <button class="header-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <!-- Timer bar -->
    <div id="timerBar" class="timer-bar">
      <!-- Stopped: description + project picker + play -->
      <div id="timerStopped" class="timer-bar-inner">
        <input type="text" id="timerDesc" class="timer-input" placeholder="What are you working on?" autocomplete="off">
        <div class="project-picker" id="projectPicker">
          <button type="button" class="project-picker-btn" id="projectPickerBtn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            <span id="projectPickerLabel">Project</span>
          </button>
          <div class="project-dropdown" id="projectDropdown">
            <input type="text" class="project-search" id="projectSearch" placeholder="Search projects..." autocomplete="off">
            <div class="project-list" id="projectList"></div>
          </div>
        </div>
        <button id="startBtn" class="timer-btn start" title="Start timer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
        </button>
      </div>
      <!-- Running: info + elapsed + stop -->
      <div id="timerRunning" class="timer-bar-inner" style="display:none">
        <div class="timer-running-info">
          <span id="runningDesc" class="running-desc"></span>
          <span id="runningProject" class="running-project"></span>
        </div>
        <span id="elapsed" class="timer-elapsed-compact"></span>
        <button id="stopBtn" class="timer-btn stop" title="Stop timer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        </button>
      </div>
    </div>

    <!-- Mode switcher -->
    <div class="mode-bar">
      <button class="mode-btn active" data-mode="timer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
        Timer
      </button>
      <button class="mode-btn" data-mode="expense">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Expense
      </button>
      <div class="mode-spacer"></div>
    </div>

    <!-- Timer panel -->
    <div id="timerPanel" class="panel">
      <div id="recentEntries" class="recent-list"></div>
      <div id="noEntries" class="empty-state" style="display:none">
        <p>No projects yet</p>
        <p class="empty-hint">Create projects in Talli to get started</p>
      </div>
    </div>

    <!-- Expense panel -->
    <div id="expensePanel" class="panel" style="display:none">
      <div id="expenseFeedback" class="feedback"></div>
      <form id="expenseForm" class="expense-form">
        <div class="expense-row">
          <div class="expense-field grow">
            <label for="expAmount">Amount</label>
            <input type="number" id="expAmount" step="0.01" min="0.01" placeholder="0.00" required>
          </div>
          <div class="expense-field">
            <label for="expCategory">Category</label>
            <select id="expCategory" required>
              <option value="software">Software</option>
              <option value="hardware">Hardware</option>
              <option value="travel">Travel</option>
              <option value="meals">Meals</option>
              <option value="contractors">Contractors</option>
              <option value="office">Office</option>
              <option value="marketing">Marketing</option>
              <option value="taxes">Taxes</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
        <div class="expense-row">
          <div class="expense-field grow">
            <label for="expVendor">Vendor</label>
            <input type="text" id="expVendor" placeholder="e.g. GitHub">
          </div>
          <div class="expense-field grow">
            <label for="expProject">Project</label>
            <select id="expProject">
              <option value="">None</option>
            </select>
          </div>
        </div>
        <div class="expense-field">
          <label for="expDescription">Note</label>
          <input type="text" id="expDescription" placeholder="Optional">
        </div>
        <button type="submit" class="btn btn-primary">Save Expense</button>
      </form>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
