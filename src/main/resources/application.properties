spring.application.name=Talli

# === Database ===
# Equivalent of DB_* vars in Laravel .env
spring.datasource.url=jdbc:postgresql://localhost:5432/talli
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate ===
# `validate` = verify schema matches entities, but don't modify DB.
# Flyway owns the schema; JPA just maps it. Same idea as Laravel where
# migrations own the DB and Eloquent just maps to it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# === Flyway ===
# Like php artisan migrate — runs on app start.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# === Thymeleaf ===
# Disable caching in dev so templates reload on save (like Blade view:clear).
spring.thymeleaf.cache=false

# === DevTools ===
# Hot reload — restarts the app when a .class changes.
spring.devtools.restart.enabled=true

# === Server ===
server.port=8080
