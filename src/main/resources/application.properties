spring.application.name=Talli

# === Database ===
# Equivalent of DB_* vars in Laravel .env
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/talli}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate ===
# `validate` = verify schema matches entities, but don't modify DB.
# Flyway owns the schema; JPA just maps it. Same idea as Laravel where
# migrations own the DB and Eloquent just maps to it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# === Flyway ===
# Like php artisan migrate — runs on app start.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# === Thymeleaf ===
# Disable caching in dev so templates reload on save (like Blade view:clear).
spring.thymeleaf.cache=false

# === DevTools ===
# Hot reload — restarts the app when a .class changes.
spring.devtools.restart.enabled=true

# === Server ===
server.port=8080

# Expose full error info on the custom error page. Override in prod if needed.
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true

# === Mail (Resend HTTP API) ===
# Domain must be verified in Resend for the from address to deliver.
app.mail.resend.api-key=${RESEND_API_KEY:}
# Svix signing secret for the Resend webhook endpoint (starts with whsec_).
app.mail.resend.webhook-secret=${RESEND_WEBHOOK_SECRET:}
app.mail.from=${MAIL_FROM:shloimy@dynamiq.dev}
app.mail.from-name=Dynamiq Solutions

# === Media storage ===
# Drivers: local, s3 (Cloudflare R2 or any S3-compatible endpoint).
app.storage.driver=${STORAGE_DRIVER:local}
app.storage.local.path=${STORAGE_LOCAL_PATH:./storage/media}
app.storage.s3.endpoint=${S3_ENDPOINT:}
app.storage.s3.region=${S3_REGION:auto}
app.storage.s3.access-key=${S3_ACCESS_KEY:}
app.storage.s3.secret-key=${S3_SECRET_KEY:}
app.storage.s3.bucket=${S3_BUCKET:}

# Multipart upload limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Tomcat 10.1+ caps multipart parts at 10 by default — raise it for forms with many fields.
server.tomcat.max-part-count=50

# === App ===
app.base-url=${APP_BASE_URL:http://localhost:8080}

# === Reminders ===
# Global default interval between reminders per client (days). Per-client override lives on the client record.
app.reminders.interval-days=${REMINDER_INTERVAL_DAYS:7}

# === Admin seed ===
app.seed.admin-email=${AUTH_ADMIN_EMAIL:admin@talli.local}
app.seed.admin-password=${AUTH_ADMIN_PASSWORD:changeme}
app.seed.admin-name=${AUTH_ADMIN_NAME:Admin}

