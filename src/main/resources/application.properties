spring.application.name=Talli

# === Database ===
# Equivalent of DB_* vars in Laravel .env
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/talli}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate ===
# `validate` = verify schema matches entities, but don't modify DB.
# Flyway owns the schema; JPA just maps it. Same idea as Laravel where
# migrations own the DB and Eloquent just maps to it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# === Flyway ===
# Like php artisan migrate — runs on app start.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# === Thymeleaf ===
# Disable caching in dev so templates reload on save (like Blade view:clear).
spring.thymeleaf.cache=false

# === DevTools ===
# Hot reload — restarts the app when a .class changes.
spring.devtools.restart.enabled=true

# === Server ===
server.port=8080

# Expose full error info on the custom error page. Override in prod if needed.
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true

# === Mail (Gmail SMTP) ===
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Who the emails appear to be from
app.mail.from=${MAIL_FROM:shloimy@dynamiq.dev}
app.mail.from-name=Dynamiq Solutions

# === Media storage ===
# Drivers: local, s3 (s3 not implemented yet — Phase C).
app.storage.driver=${STORAGE_DRIVER:local}
app.storage.local.path=${STORAGE_LOCAL_PATH:./storage/media}

# Multipart upload limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Tomcat 10.1+ caps multipart parts at 10 by default — raise it for forms with many fields.
server.tomcat.max-part-count=50

# === App ===
app.base-url=${APP_BASE_URL:http://localhost:8080}

# === Admin seed ===
app.seed.admin-email=${AUTH_ADMIN_EMAIL:admin@talli.local}
app.seed.admin-password=${AUTH_ADMIN_PASSWORD:changeme}
app.seed.admin-name=${AUTH_ADMIN_NAME:Admin}

