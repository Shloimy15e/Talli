<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{layout :: head('Sign in · Talli')}"></head>
  <body class="bg-slate-50 min-h-screen flex items-center justify-center antialiased">
    <div class="w-full max-w-sm px-4">

      <div class="flex items-center gap-2 justify-center mb-8">
        <img src="/logo.svg" class="w-8 h-8" alt="Talli" />
        <span class="text-xl font-bold tracking-tight">Talli</span>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
        <h1 class="text-lg font-semibold mb-6">Sign in</h1>

        <div th:if="${param.error}"
             class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
          Wrong email or password.
        </div>
        <div th:if="${param['logged-out']}"
             class="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-sm text-green-700">
          You've been signed out.
        </div>

        <form th:action="@{/login}" method="post" class="space-y-4">
          <div>
            <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Email</label>
            <input type="email" id="username" name="username" required autofocus autocomplete="email"
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>
          <div>
            <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password"
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="remember-me"
                   class="w-4 h-4 rounded border-slate-300 text-[#ea7c28] focus:ring-[#ea7c28]/30">
            <span class="text-sm text-slate-700">Remember me for 30 days</span>
          </label>
          <button type="submit"
                  class="w-full bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2.5 rounded-lg transition">
            Sign in
          </button>
        </form>
      </div>

      <p class="text-center text-xs text-slate-400 mt-6">Internal tool · Dynamiq Solutions</p>
    </div>
  </body>
</html>
