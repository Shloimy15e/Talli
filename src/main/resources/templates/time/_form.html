<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>

    <div th:fragment="form(entry, action, title, projects)"
         class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm"
         @click.self="$dispatch('close-modal')">

      <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4"
           x-data="{
             startedAt: '',
             endedAt: '',
             get duration() {
               if (!this.startedAt || !this.endedAt) return null;
               const diff = new Date(this.endedAt) - new Date(this.startedAt);
               if (diff <= 0) return null;
               const minutes = Math.floor(diff / 60000);
               const h = Math.floor(minutes / 60);
               const m = minutes % 60;
               if (h === 0) return m + 'm';
               if (m === 0) return h + 'h';
               return h + 'h ' + m + 'm';
             }
           }"
           x-init="startedAt = document.getElementById('startedAt').value; endedAt = document.getElementById('endedAt').value"
           x-transition:enter="ease-out duration-200"
           x-transition:enter-start="opacity-0 scale-95"
           x-transition:enter-end="opacity-100 scale-100">

        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
          <h2 class="text-lg font-semibold" th:text="${title}">Time Entry</h2>
          <button type="button" @click="$dispatch('close-modal')"
                  class="text-slate-400 hover:text-slate-700 text-xl leading-none">×</button>
        </div>

        <form th:action="${action}" method="post" class="p-6 space-y-5">

          <!-- Project -->
          <div>
            <label for="projectId" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Project</label>
            <select id="projectId" name="projectId" required
                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
              <option value="" disabled th:selected="${entry.project == null}">Select a project…</option>
              <option th:each="p : ${projects}"
                      th:value="${p.id}"
                      th:selected="${entry.project != null and entry.project.id == p.id}"
                      th:text="${p.name} + ' · ' + ${p.client.name}">Project · Client</option>
            </select>
          </div>

          <!-- Started / Ended -->
          <div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label for="startedAt" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Started</label>
                <input type="datetime-local" id="startedAt" name="startedAt" required x-model="startedAt"
                       th:value="${entry.startedAt != null ? #temporals.format(entry.startedAt, 'yyyy-MM-dd''T''HH:mm') : ''}"
                       class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
              </div>
              <div>
                <label for="endedAt" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Ended</label>
                <input type="datetime-local" id="endedAt" name="endedAt" x-model="endedAt"
                       th:value="${entry.endedAt != null ? #temporals.format(entry.endedAt, 'yyyy-MM-dd''T''HH:mm') : ''}"
                       class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
              </div>
            </div>

            <!-- Live duration calculation -->
            <div class="mt-2 flex items-center justify-between text-xs">
              <span class="text-slate-500">Duration</span>
              <span x-show="duration" class="font-mono font-semibold text-[#ea7c28]" x-text="duration">—</span>
              <span x-show="!duration" class="text-slate-400">—</span>
            </div>
          </div>

          <!-- Description -->
          <div>
            <label for="description" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Description</label>
            <textarea id="description" name="description" rows="3"
                      placeholder="What did you work on?"
                      th:text="${entry.description}"
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"></textarea>
          </div>

          <!-- Billable -->
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="billable" value="true"
                   th:checked="${entry.billable != null ? entry.billable : true}"
                   class="w-4 h-4 rounded border-slate-300 text-[#ea7c28] focus:ring-[#ea7c28]/30">
            <span class="text-sm text-slate-700">Billable</span>
          </label>

          <div class="flex items-center justify-end gap-3 pt-2">
            <button type="button" @click="$dispatch('close-modal')"
                    class="text-sm text-slate-600 hover:text-slate-900 px-4 py-2">Cancel</button>
            <button type="submit"
                    class="bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
              Save
            </button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
