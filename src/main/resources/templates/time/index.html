<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head th:replace="~{layout :: head('Time')}"></head>
  <body th:replace="~{layout :: page('time', ~{::section})}">
    <section>

      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Time</h1>
          <p class="text-sm text-slate-500 mt-1" th:text="${#lists.size(view.entries)} + ' entr' + (${#lists.size(view.entries)} == 1 ? 'y' : 'ies')">0 entries</p>
        </div>
        <button sec:authorize="hasAuthority('manage-time')"
                hx-get="/time/new" hx-target="#modal" hx-swap="innerHTML"
                class="inline-flex items-center gap-2 bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
          <i data-lucide="plus" class="w-4 h-4"></i>
          Log Time
        </button>
      </div>

      <!-- Summary tiles -->
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-xl border border-slate-200 p-4">
          <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Today</p>
          <p class="text-2xl font-semibold mt-1 font-mono tabular-nums">
            <span th:text="${view.todayMinutes / 60}">0</span><span class="text-base text-slate-500">h</span>
            <span class="ml-0.5" th:text="${view.todayMinutes % 60}">0</span><span class="text-base text-slate-500">m</span>
          </p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-4">
          <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">This Week</p>
          <p class="text-2xl font-semibold mt-1 font-mono tabular-nums">
            <span th:text="${view.weekMinutes / 60}">0</span><span class="text-base text-slate-500">h</span>
            <span class="ml-0.5" th:text="${view.weekMinutes % 60}">0</span><span class="text-base text-slate-500">m</span>
          </p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-4">
          <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">This Month</p>
          <p class="text-2xl font-semibold mt-1 font-mono tabular-nums">
            <span th:text="${view.monthMinutes / 60}">0</span><span class="text-base text-slate-500">h</span>
            <span class="ml-0.5" th:text="${view.monthMinutes % 60}">0</span><span class="text-base text-slate-500">m</span>
          </p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-4">
          <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Unbilled</p>
          <p class="text-2xl font-semibold mt-1 font-mono tabular-nums text-[#ea7c28]"
             th:text="'$' + ${#numbers.formatDecimal(view.unbilledValue, 1, 'COMMA', 2, 'POINT')}">$0.00</p>
          <p class="text-[11px] text-slate-500 mt-0.5 tabular-nums">
            <span th:text="${view.unbilledMinutes / 60} + 'h ' + ${view.unbilledMinutes % 60} + 'm'">0h 0m</span>
          </p>
        </div>
      </div>

      <!-- Running timer banner with live counter -->
      <div th:if="${running != null}"
           th:attr="data-started=${#temporals.format(running.startedAt, 'yyyy-MM-dd''T''HH:mm:ss')}"
           x-data="{
             elapsed: '00:00:00',
             tick() {
               const started = new Date(this.$el.dataset.started);
               const diff = Math.floor((Date.now() - started.getTime()) / 1000);
               const h = String(Math.floor(diff / 3600)).padStart(2, '0');
               const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
               const s = String(diff % 60).padStart(2, '0');
               this.elapsed = h + ':' + m + ':' + s;
             }
           }"
           x-init="tick(); setInterval(() => tick(), 1000)"
           class="mb-6 p-4 bg-[#ea7c28]/10 border border-[#ea7c28]/30 rounded-xl flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div class="w-2.5 h-2.5 bg-[#ea7c28] rounded-full animate-pulse"></div>
          <div>
            <p class="text-sm font-medium text-slate-900">
              <span th:text="${running.project.name}">Project</span>
              <span class="text-slate-400">·</span>
              <span class="text-slate-500 text-xs" th:text="${running.project.client.name}">Client</span>
            </p>
            <p class="text-xs text-slate-500 mt-0.5" th:text="${running.description} ?: 'No description'">description</p>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <span class="font-mono text-2xl font-semibold text-slate-900 tabular-nums" x-text="elapsed">00:00:00</span>
          <form th:action="@{/time/{id}/stop(id=${running.id})}" method="post">
            <button type="submit"
                    class="inline-flex items-center gap-1.5 bg-slate-900 hover:bg-slate-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition">
              <i data-lucide="square" class="w-3.5 h-3.5"></i> Stop</button>
          </form>
        </div>
      </div>

      <!-- Quick-start form when no timer is running -->
      <div th:if="${running == null and !#lists.isEmpty(projects)}"
           sec:authorize="hasAuthority('manage-time')"
           class="mb-6 p-4 bg-white border border-slate-200 rounded-xl">
        <form th:action="@{/time/start}" method="post" class="flex items-center gap-3">
          <select name="projectId" required
                  class="px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            <option value="" disabled selected>Pick a project…</option>
            <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name} + ' · ' + ${p.client.name}">Project</option>
          </select>
          <input type="text" name="description" placeholder="What are you working on?"
                 class="flex-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          <button type="submit" class="inline-flex items-center gap-1.5 bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
            <i data-lucide="play" class="w-4 h-4"></i> Start Timer</button>
        </form>
      </div>

      <!-- Empty state -->
      <div th:if="${#lists.isEmpty(view.days)}" class="bg-white rounded-xl border border-slate-200 p-12 text-center">
        <p class="text-slate-500">No time logged yet.</p>
        <button hx-get="/time/new" hx-target="#modal" class="text-[#ea7c28] hover:underline mt-2">Log your first entry</button>
      </div>

      <!-- Day-grouped entries -->
      <div th:unless="${#lists.isEmpty(view.days)}" class="space-y-4">
        <div th:each="g : ${view.days}" class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div class="flex items-center justify-between px-6 py-3 border-b border-slate-100 bg-slate-50/50">
            <div class="flex items-center gap-3">
              <h3 class="text-sm font-semibold text-slate-900"
                  th:text="${#temporals.format(g.day, 'EEEE, MMM d')}">Monday, Apr 14</h3>
              <span class="text-xs text-slate-400"
                    th:if="${g.day.toString() == #temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">Today</span>
            </div>
            <div class="flex items-center gap-4 text-xs font-mono tabular-nums">
              <span class="text-slate-500" th:text="${g.minutes / 60} + 'h ' + ${g.minutes % 60} + 'm'">4h 30m</span>
              <span th:if="${g.value.signum() > 0}" class="text-[#ea7c28] font-semibold"
                    th:text="'$' + ${#numbers.formatDecimal(g.value, 1, 'COMMA', 2, 'POINT')}">$450.00</span>
            </div>
          </div>

          <table class="w-full">
            <tbody>
              <tr th:each="e : ${g.entries}" class="border-b border-slate-100 last:border-b-0 hover:bg-slate-50 transition group">
                <td class="px-6 py-3 text-xs text-slate-500 tabular-nums w-20"
                    th:text="${#temporals.format(e.startedAt, 'HH:mm')}">14:30</td>
                <td class="px-6 py-3 text-sm">
                  <div class="font-medium" th:text="${e.project.name}">Project</div>
                  <div class="text-xs text-slate-500" th:text="${e.project.client.name}">Client</div>
                </td>
                <td class="px-6 py-3 text-sm text-slate-500" th:text="${e.description} ?: ''">description</td>
                <td class="px-6 py-3 w-28">
                  <span th:if="${e.billed}" class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600">
                    Billed
                    <a th:if="${e.invoice != null}" th:href="@{/invoices/{id}(id=${e.invoice.id})}"
                       class="ml-1 text-[#ea7c28] hover:underline font-mono text-[10px]"
                       th:text="${e.invoice.reference}">INV-1001</a>
                  </span>
                  <span th:if="${!e.billed and e.billable}" class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-50 text-amber-700">Unbilled</span>
                  <span th:if="${!e.billable}" class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-500">Non-billable</span>
                </td>
                <td class="px-6 py-3 font-mono text-sm text-right w-32">
                  <div th:classappend="${e.billable} ? 'text-[#ea7c28]' : 'text-slate-500'"
                       th:text="${e.durationMinutes / 60} + 'h ' + ${e.durationMinutes % 60} + 'm'">1h 30m</div>
                  <div th:if="${e.billable and view.entryValues.get(e.id) != null}"
                       class="text-xs text-slate-500"
                       th:text="'$' + ${#numbers.formatDecimal(view.entryValues.get(e.id), 1, 'COMMA', 2, 'POINT')}">$150.00</div>
                </td>
                <td class="px-6 py-3 text-right w-24">
                  <div sec:authorize="hasAuthority('manage-time')"
                       class="opacity-0 group-hover:opacity-100 transition flex items-center gap-2 justify-end">
                    <button th:hx-get="@{/time/{id}/edit(id=${e.id})}" hx-target="#modal"
                            class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-900">
                      <i data-lucide="pencil" class="w-3 h-3"></i> Edit</button>
                    <form th:action="@{/time/{id}/delete(id=${e.id})}" method="post" class="inline"
                          onsubmit="return confirm('Delete this entry?')">
                      <button type="submit" class="inline-flex items-center gap-1 text-xs text-red-500 hover:text-red-700">
                        <i data-lucide="trash-2" class="w-3 h-3"></i> Delete</button>
                    </form>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </section>
  </body>
</html>
