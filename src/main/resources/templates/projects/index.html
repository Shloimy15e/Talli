<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head th:replace="~{layout :: head('Projects')}"></head>
  <body th:replace="~{layout :: page('projects', ~{::section})}">
    <section>
      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Projects</h1>
          <p
            class="text-sm text-slate-500 mt-1"
            th:text="${page.totalElements} + ' project' + (${page.totalElements} == 1 ? '' : 's')"
          >
            0 projects
          </p>
        </div>
        <button
          hx-get="/projects/new"
          hx-target="#modal"
          hx-swap="innerHTML"
          sec:authorize="hasAuthority('manage-projects')"
          class="inline-flex items-center gap-2 bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition"
        >
          <i data-lucide="plus" class="w-4 h-4"></i>
          New Project
        </button>
      </div>

      <!-- Filters -->
      <form method="get" th:action="@{/projects}" class="mb-5">
        <div class="flex items-center gap-4 flex-wrap">
          <!-- Search -->
          <div class="relative flex-shrink-0">
            <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
            <input type="text" name="search" th:value="${filterSearch}" placeholder="Search projects..."
                   class="w-64 pl-9 pr-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/20 focus:border-[#ea7c28] placeholder-slate-400">
          </div>

          <!-- Client dropdown -->
          <select name="clientId" onchange="this.form.submit()"
                  class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/20 focus:border-[#ea7c28]">
            <option value="">All clients</option>
            <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.name}"
                    th:selected="${filterClientIds != null and filterClientIds.contains(c.id)}">Client</option>
          </select>

          <!-- Status pills -->
          <div class="flex items-center gap-1 border-l border-slate-200 pl-4">
            <label th:each="s : ${ {'active','paused','completed','cancelled'} }"
                   th:class="'inline-flex items-center px-3 py-1.5 rounded-full text-xs font-medium cursor-pointer select-none transition-all '
                     + (${filterStatuses != null and filterStatuses.contains(s)}
                       ? (${s == 'active'} ? 'bg-emerald-50 border border-emerald-200 text-emerald-700 shadow-sm'
                         : (${s == 'paused'} ? 'bg-amber-50 border border-amber-200 text-amber-700 shadow-sm'
                           : (${s == 'cancelled'} ? 'bg-red-50 border border-red-200 text-red-700 shadow-sm'
                             : 'bg-slate-100 border border-slate-300 text-slate-600 shadow-sm')))
                       : 'bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-slate-700')">
              <input type="checkbox" name="status" th:value="${s}"
                     th:checked="${filterStatuses != null and filterStatuses.contains(s)}"
                     onchange="this.form.submit()" class="hidden">
              <span th:text="${#strings.capitalize(s)}">Status</span>
            </label>
          </div>

          <!-- Clear -->
          <th:block th:if="${filterStatuses != null or filterClientIds != null or (filterSearch != null and !filterSearch.isBlank())}">
            <a th:href="@{/projects}"
               class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-700 ml-auto">
              <i data-lucide="x" class="w-3 h-3"></i> Clear
            </a>
          </th:block>
        </div>
      </form>

      <div
        th:if="${#lists.isEmpty(projects)}"
        class="bg-white rounded-xl border border-slate-200 p-12 text-center"
      >
        <p class="text-slate-500">No projects yet.</p>
        <button
          hx-get="/projects/new"
          hx-target="#modal"
          class="text-[#ea7c28] hover:underline mt-2"
        >
          Add your first project
        </button>
      </div>

      <div
        th:unless="${#lists.isEmpty(projects)}"
        class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm"
      >
        <table class="w-full">
          <thead>
            <tr class="border-b border-slate-200">
              <th
                class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3"
              >
                Project
              </th>
              <th
                class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3"
              >
                Client
              </th>
              <th
                class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3"
              >
                Rate
              </th>
              <th
                class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3"
              >
                Billing
              </th>
              <th
                class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3"
              >
                Status
              </th>
              <th class="px-6 py-3 w-32"></th>
            </tr>
          </thead>
          <tbody>
            <tr
              th:each="project : ${projects}"
              class="border-b border-slate-100 hover:bg-slate-50 transition group"
            >
              <td class="px-6 py-4 font-medium">
                <a th:href="@{/projects/{id}(id=${project.id})}"
                   class="hover:text-[#ea7c28] hover:underline"
                   th:text="${project.name}">Name</a>
              </td>
              <td
                class="px-6 py-4 text-slate-600"
                th:text="${project.client.name}"
              >
                Client
              </td>
              <td class="px-6 py-4 font-mono text-sm text-[#ea7c28]">
                <span th:text="${project.currentRate}">0</span>
                <span
                  class="text-slate-500 text-xs ml-1"
                  th:text="${project.currency}"
                  >USD</span
                >
                <span
                  class="text-slate-400 text-xs"
                  th:text="${project.rateType == 'hourly'} ? '/hr' : ''"
                  >/hr</span
                >
              </td>

              <td
                class="px-6 py-4 text-slate-600 text-sm"
                th:text="${project.rateType}"
              >
                type
              </td>
              <td class="px-6 py-4">
                <span
                  class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"
                  th:classappend="${project.status == 'active' ? 'bg-green-100 text-green-700' : (project.status == 'paused' ? 'bg-amber-100 text-amber-700' : (project.status == 'completed' ? 'bg-slate-100 text-slate-600' : 'bg-red-100 text-red-700'))}"
                  th:text="${project.status}"
                  >status</span
                >
              </td>
              <td class="px-6 py-4 text-right">
                <div
                  class="opacity-0 group-hover:opacity-100 transition flex items-center gap-2 justify-end"
                >
                  <button
                    th:hx-get="@{/projects/{id}/edit(id=${project.id})}"
                    hx-target="#modal"
                    sec:authorize="hasAuthority('manage-projects')"
                    class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-900"
                  >
                    <i data-lucide="pencil" class="w-3 h-3"></i> Edit
                  </button>
                  <form
                    th:action="@{/projects/{id}/delete(id=${project.id})}"
                    method="post"
                    class="inline"
                    sec:authorize="hasAuthority('manage-projects')"
                    onsubmit="return confirm('Delete this project?');"
                  >
                    <button
                      type="submit"
                      class="inline-flex items-center gap-1 text-xs text-red-500 hover:text-red-700"
                    >
                      <i data-lucide="trash-2" class="w-3 h-3"></i> Delete
                    </button>
                  </form>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <!-- Pagination -->
      <div th:if="${page != null and page.totalPages > 1}"
           class="mt-4 flex items-center justify-between text-sm">
        <p class="text-slate-500">
          Showing <span th:text="${page.number * page.size + 1}">1</span>–<span th:text="${page.number * page.size + page.numberOfElements}">25</span>
          of <span th:text="${page.totalElements}">100</span>
        </p>
        <div class="flex items-center gap-1">
          <a th:if="${page.number > 0}"
             th:href="@{/projects(page=${page.number - 1}, status=${filterStatuses}, clientId=${filterClientIds}, search=${filterSearch})}"
             class="px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-700">Prev</a>
          <span th:if="${page.number == 0}"
                class="px-3 py-1.5 rounded-lg border border-slate-100 text-slate-300 cursor-not-allowed">Prev</span>

          <th:block th:each="p : ${#numbers.sequence(0, page.totalPages - 1)}">
            <a th:if="${p != page.number}"
               th:href="@{/projects(page=${p}, status=${filterStatuses}, clientId=${filterClientIds}, search=${filterSearch})}"
               th:text="${p + 1}"
               class="px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-700">1</a>
            <span th:if="${p == page.number}"
                  th:text="${p + 1}"
                  class="px-3 py-1.5 rounded-lg bg-[#ea7c28] text-white font-medium">1</span>
          </th:block>

          <a th:if="${page.number < page.totalPages - 1}"
             th:href="@{/projects(page=${page.number + 1}, status=${filterStatuses}, clientId=${filterClientIds}, search=${filterSearch})}"
             class="px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-700">Next</a>
          <span th:if="${page.number >= page.totalPages - 1}"
                class="px-3 py-1.5 rounded-lg border border-slate-100 text-slate-300 cursor-not-allowed">Next</span>
        </div>
      </div>

    </section>
  </body>
</html>
