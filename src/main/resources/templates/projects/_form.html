<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <!-- Fragment: project-form
     Expects: project, action, title, clients, sows -->
    <div th:fragment="form(project, action, title, clients, sows)"
         th:replace="~{fragments/modal :: shell(${title}, 'max-w-lg', ~{::#body})}">
      <div id="body"
           th:attr="x-data='{ rateType: ' + '&quot;' + (${project.rateType} ?: 'hourly') + '&quot;' + ' }'">
        <form
          th:action="@{${action}(_csrf=${_csrf.token})}"
          th:object="${project}"
          method="post"
          enctype="multipart/form-data"
          class="p-6 space-y-5"
        >
          <!-- Client dropdown -->
          <div>
            <label
              for="client"
              class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2"
              >Client</label
            >
            <select
              id="client"
              name="clientId"
              required
              class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"
            >
              <option value="" disabled th:selected="${project.client == null}">
                Select a client…
              </option>
              <option
                th:each="c : ${clients}"
                th:value="${c.id}"
                th:text="${c.name}"
                th:selected="${project.client != null and project.client.id == c.id}"
              >
                Client
              </option>
            </select>
          </div>

          <!-- Name -->
          <div>
            <label
              for="name"
              class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2"
              >Project Name</label
            >
            <input
              type="text"
              id="name"
              th:field="*{name}"
              required
              autofocus
              placeholder="e.g. Website redesign"
              class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"
            />
          </div>

          <!-- Rate type + current rate -->
          <div class="grid grid-cols-3 gap-3">
            <div>
              <label
                for="rateType"
                class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2"
                >Rate Type</label
              >
              <select
                id="rateType"
                th:field="*{rateType}"
                x-model="rateType"
                class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"
              >
                <option value="hourly">Hourly</option>
                <option value="fixed">Fixed</option>
                <option value="retainer">Retainer</option>
              </select>
            </div>
            <div>
              <label
                for="currency"
                class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2"
                >Currency</label
              >
              <select
                id="currency"
                th:field="*{currency}"
                class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"
              >
                <option value="USD">USD $</option>
                <option value="ILS">ILS ₪</option>
                <option value="EUR">EUR €</option>
                <option value="GBP">GBP £</option>
              </select>
            </div>
            <div>
              <label
                for="currentRate"
                class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2"
                >Rate</label
              >
              <input
                type="number"
                step="0.01"
                id="currentRate"
                th:field="*{currentRate}"
                required
                placeholder="0.00"
                class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"
              />
            </div>
          </div>

          <!-- Billing — same slot, contents swap without layout jump. -->
          <div class="relative h-[70px]">
            <!-- Hourly / retainer options -->
            <div
              x-show="rateType !== 'fixed'"
              class="absolute inset-0"
              x-transition:enter="ease-out duration-150"
              x-transition:enter-start="opacity-0"
              x-transition:enter-end="opacity-100"
              x-transition:leave="ease-in duration-75"
              x-transition:leave-start="opacity-100"
              x-transition:leave-end="opacity-0"
            >
              <label
                class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2"
                >Invoice Every</label
              >
              <select
                name="billingFrequency"
                :disabled="rateType === 'fixed'"
                class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"
              >
                <option
                  value="weekly"
                  th:selected="${project.billingFrequency == 'weekly'}"
                >
                  Week
                </option>
                <option
                  value="biweekly"
                  th:selected="${project.billingFrequency == 'biweekly'}"
                >
                  Two Weeks
                </option>
                <option
                  value="monthly"
                  th:selected="${project.billingFrequency == 'monthly'}"
                >
                  Month
                </option>
              </select>
            </div>

            <!-- Fixed options — absolutely positioned over the same spot -->
            <div
              x-show="rateType === 'fixed'"
              x-cloak
              class="absolute inset-0"
              x-transition:enter="ease-out duration-150"
              x-transition:enter-start="opacity-0"
              x-transition:enter-end="opacity-100"
              x-transition:leave="ease-in duration-75"
              x-transition:leave-start="opacity-100"
              x-transition:leave-end="opacity-0"
            >
              <label
                class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2"
                >Invoice</label
              >
              <select
                name="billingFrequency"
                :disabled="rateType !== 'fixed'"
                class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"
              >
                <option
                  value="upfront"
                  th:selected="${project.billingFrequency == 'upfront'}"
                >
                  Upfront (one-time at start)
                </option>
                <option
                  value="delivery"
                  th:selected="${project.billingFrequency == 'delivery'}"
                >
                  On delivery (one-time at end)
                </option>
                <option
                  value="milestone"
                  th:selected="${project.billingFrequency == 'milestone'}"
                >
                  By milestone
                </option>
              </select>
            </div>
          </div>

          <!-- Status -->
          <div>
            <label
              for="status"
              class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2"
              >Status</label
            >
            <select
              id="status"
              th:field="*{status}"
              class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"
            >
              <option value="active">Active</option>
              <option value="paused">Paused</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>

          <!-- Notes -->
          <div>
            <label
              for="notes"
              class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2"
              >Notes</label
            >
            <textarea
              id="notes"
              th:field="*{notes}"
              rows="3"
              class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"
            ></textarea>
          </div>

          <!-- SOW / contract documents -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">SOW / Contract</label>

            <ul th:if="${sows != null and not #lists.isEmpty(sows)}" class="space-y-1 mb-2">
              <li th:each="m : ${sows}"
                  class="flex items-center justify-between px-3 py-2 bg-slate-50 rounded-lg text-sm">
                <a th:href="@{/media/{id}(id=${m.id})}" target="_blank"
                   class="text-[#ea7c28] hover:underline truncate flex-1">
                  <span th:text="${m.filename}">sow.pdf</span>
                  <span class="text-slate-400 text-xs ml-2"
                        th:text="${#numbers.formatDecimal(m.sizeBytes / 1024.0, 1, 'COMMA', 1, 'POINT') + ' KB'}">12.0 KB</span>
                </a>
                <button type="submit" formmethod="post" formnovalidate
                        th:formaction="@{/media/{id}/delete(id=${m.id})}"
                        class="text-slate-400 hover:text-red-600 text-xs ml-3"
                        onclick="return confirm('Delete this document?')">Delete</button>
              </li>
            </ul>

            <input type="file" name="sow" accept="image/*,application/pdf"
                   class="w-full text-xs text-slate-700 file:mr-2 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-xs file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 cursor-pointer" />
            <p class="text-[10px] text-slate-400 mt-1">PDF or image. Attach on save.</p>
          </div>

          <div class="flex items-center justify-end gap-3 pt-2">
            <button
              type="button"
              @click="$dispatch('close-modal')"
              class="text-sm text-slate-600 hover:text-slate-900 px-4 py-2"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition"
            >
              Save
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
