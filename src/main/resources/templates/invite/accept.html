<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set your password — Talli</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="flex items-center gap-2 justify-center mb-3">
        <img src="/logo.svg" alt="Talli" class="w-9 h-9" />
        <span class="text-xl font-semibold">Talli</span>
      </div>
      <h1 class="text-xl font-semibold tracking-tight">Welcome to Talli</h1>
      <p class="text-sm text-slate-500 mt-1">Set your password to get started, <span th:text="${name}">Name</span>.</p>
    </div>

    <div th:if="${error}" class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-800"
         th:text="${error}">error</div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
      <form th:action="@{/invite/{token}(token=${token})}" method="post" class="space-y-5">

        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Email</label>
          <p class="text-sm text-slate-700" th:text="${email}">user@example.com</p>
        </div>

        <div>
          <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Password</label>
          <input type="password" id="password" name="password" required minlength="8" autofocus
                 class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
        </div>

        <div>
          <label for="passwordConfirmation" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Confirm password</label>
          <input type="password" id="passwordConfirmation" name="passwordConfirmation" required minlength="8"
                 class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
        </div>

        <button type="submit"
                class="w-full bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium py-2.5 rounded-lg transition">
          Set password & continue
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-slate-400 mt-6">Dynamiq Solutions</p>
  </div>

</body>
</html>
