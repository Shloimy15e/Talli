<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{layout :: head('Profile')}"></head>
  <body th:replace="~{layout :: page('profile', ~{::section})}">
    <section>

      <div class="mb-8">
        <h1 class="text-2xl font-semibold tracking-tight">Profile</h1>
        <p class="text-sm text-slate-500 mt-1">Your account settings.</p>
      </div>

      <!-- Flash messages -->
      <div th:if="${message}" class="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-sm text-green-700"
           th:text="${message}">Saved.</div>
      <div th:if="${error}" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700"
           th:text="${error}">Error.</div>

      <!-- Account info -->
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm mb-6">
        <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
          <h2 class="text-sm font-semibold">Account</h2>
          <span th:each="r : ${user.roles}"
                class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-[#ea7c28]/10 text-[#ea7c28] capitalize ml-1"
                th:text="${r.name}">admin</span>
        </div>

        <form th:action="@{/profile}" method="post" class="p-6 space-y-5">
          <div>
            <label for="name" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Name</label>
            <input type="text" id="name" name="name" required th:value="${user.name}"
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>
          <div>
            <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Email</label>
            <input type="email" id="email" name="email" required th:value="${user.email}"
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>
          <div class="flex justify-end">
            <button type="submit"
                    class="bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
              Save Changes
            </button>
          </div>
        </form>
      </div>

      <!-- Change password -->
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
        <div class="px-6 py-4 border-b border-slate-200">
          <h2 class="text-sm font-semibold">Change Password</h2>
        </div>

        <form th:action="@{/profile/password}" method="post" class="p-6 space-y-5">
          <div>
            <label for="currentPassword" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Current Password</label>
            <input type="password" id="currentPassword" name="currentPassword" required autocomplete="current-password"
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="newPassword" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">New Password</label>
              <input type="password" id="newPassword" name="newPassword" required minlength="8" autocomplete="new-password"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
            <div>
              <label for="confirmPassword" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Confirm Password</label>
              <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" autocomplete="new-password"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
          </div>
          <p class="text-xs text-slate-500">Minimum 8 characters.</p>
          <div class="flex justify-end">
            <button type="submit"
                    class="bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
              Change Password
            </button>
          </div>
        </form>
      </div>

    </section>
  </body>
</html>
