<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{portal/layout :: head('Invoice ' + ${invoice.reference})}"></head>
  <body th:replace="~{portal/layout :: portal(~{::main})}">
    <main>

      <div class="mb-6">
        <a href="/portal" class="text-sm text-slate-500 hover:text-slate-900">← Back</a>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <!-- Header -->
        <div class="px-8 py-6 border-b border-slate-200 flex items-start justify-between">
          <div>
            <h1 class="font-mono text-2xl font-semibold tracking-tight" th:text="${invoice.reference}">INV-1001</h1>
            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium capitalize mt-2"
                  th:classappend="${invoice.status == 'paid'} ? 'bg-emerald-50 text-emerald-700' : (${invoice.status == 'overdue'} ? 'bg-red-50 text-red-700' : 'bg-[#ea7c28]/10 text-[#ea7c28]')"
                  th:text="${invoice.status}">unpaid</span>
          </div>
          <div class="text-right">
            <p class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Total</p>
            <p class="font-mono text-3xl font-semibold tabular-nums mt-1"
               th:text="${csym.apply(invoice.currency)} + ${#numbers.formatDecimal(invoice.amount, 1, 'COMMA', 2, 'POINT')}">USD 0.00</p>
          </div>
        </div>

        <!-- Meta -->
        <div class="px-8 py-5 border-b border-slate-200 grid grid-cols-3 gap-6 text-sm">
          <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 font-semibold mb-1">Issued</p>
            <p class="tabular-nums" th:text="${#temporals.format(invoice.issuedAt, 'MMM d, yyyy')}">—</p>
          </div>
          <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 font-semibold mb-1">Due</p>
            <p class="tabular-nums">
              <span th:if="${invoice.dueAt != null}"
                    th:replace="~{fragments/_time :: dateago(${invoice.dueAt})}"></span>
              <span th:if="${invoice.dueAt == null}">—</span>
            </p>
          </div>
          <div>
            <p class="text-xs uppercase tracking-wider text-slate-500 font-semibold mb-1">Balance</p>
            <p class="font-mono tabular-nums font-medium"
               th:classappend="${balance.signum() > 0} ? 'text-[#ea7c28]' : 'text-emerald-600'"
               th:text="${csym.apply(invoice.currency)} + ${#numbers.formatDecimal(balance, 1, 'COMMA', 2, 'POINT')}">USD 0.00</p>
          </div>
        </div>

        <!-- Notes -->
        <div th:if="${invoice.notes}" class="px-8 py-5 bg-slate-50">
          <p class="text-xs uppercase tracking-wider text-slate-500 font-semibold mb-2">Notes</p>
          <p class="text-sm text-slate-700 whitespace-pre-wrap" th:text="${invoice.notes}">Notes</p>
        </div>
      </div>

    </main>
  </body>
</html>
