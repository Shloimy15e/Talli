<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

  <head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — Talli'">Talli</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>body { font-family: 'Inter', sans-serif; }</style>
  </head>

  <body th:fragment="portal(content)">
    <div class="min-h-screen bg-slate-100">

      <!-- Top bar -->
      <header class="bg-[#161f30] text-white">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <img src="/logo.svg" alt="Talli" class="w-6 h-6"/>
            <span class="font-semibold">Talli</span>
          </div>
          <div class="flex items-center gap-4">
            <a href="/portal/statement" class="text-xs text-slate-300 hover:text-white">Download Statement</a>
            <form th:action="@{/logout}" method="post">
              <button type="submit" class="text-xs text-slate-400 hover:text-white">Sign out</button>
            </form>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="max-w-5xl mx-auto px-6 py-8">
        <th:block th:replace="${content}"></th:block>
      </main>

    </div>
  </body>

</html>
