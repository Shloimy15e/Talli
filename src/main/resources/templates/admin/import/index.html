<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{layout :: head('Import Data')}"></head>
  <body th:replace="~{layout :: page('import', ~{::section})}">
    <section>

      <div class="mb-8">
        <h1 class="text-2xl font-semibold tracking-tight">Import Data</h1>
        <p class="text-sm text-slate-500 mt-1">Upload a CSV or Excel file to import expenses.</p>
      </div>

      <div th:if="${error}" class="mb-6 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-800 flex items-center gap-2">
        <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
        <span th:text="${error}">error</span>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden max-w-xl">
        <div class="px-6 py-4 border-b border-slate-200">
          <h2 class="font-semibold text-sm">Upload file</h2>
        </div>
        <form action="/admin/import/upload" method="post" enctype="multipart/form-data"
              class="px-6 py-5 space-y-4">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">File</label>
            <input type="file" name="file" required
                   accept=".csv,.xlsx,.xls,.tsv"
                   class="w-full text-sm text-slate-700 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 cursor-pointer">
            <p class="text-xs text-slate-400 mt-2">Supported formats: CSV, TSV, Excel (.xlsx). First row must be headers.</p>
          </div>

          <div class="flex items-center justify-end pt-2">
            <button type="submit"
                    class="inline-flex items-center gap-2 bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
              <i data-lucide="upload" class="w-4 h-4"></i>
              Upload &amp; Preview
            </button>
          </div>
        </form>
      </div>

    </section>
  </body>
</html>
