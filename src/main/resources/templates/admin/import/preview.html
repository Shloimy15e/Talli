<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{layout :: head('Import Preview')}"></head>
  <body th:replace="~{layout :: page('import', ~{::section})}">
    <section>

      <div class="mb-6 flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Map Columns</h1>
          <p class="text-sm text-slate-500 mt-1">
            <span th:text="${totalRows}">0</span> rows found
            <span th:if="${filename}" class="text-slate-400">
              &middot; <span th:text="${filename}">file.csv</span>
            </span>
          </p>
        </div>
        <a href="/admin/import" class="inline-flex items-center gap-1 text-sm text-slate-500 hover:text-slate-900">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> Start over
        </a>
      </div>

      <div th:if="${error}" class="mb-6 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-800 flex items-center gap-2">
        <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
        <span th:text="${error}">error</span>
      </div>

      <form action="/admin/import/confirm" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <!-- Column mapping -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-6">
          <div class="px-6 py-4 border-b border-slate-200">
            <h2 class="font-semibold text-sm">Column mapping</h2>
            <p class="text-xs text-slate-400 mt-1">Map each file column to an expense field. Unmapped columns will be ignored.</p>
          </div>
          <div class="px-6 py-4 grid grid-cols-2 gap-3">
            <th:block th:each="header : ${headers}">
              <div class="flex items-center gap-3">
                <span class="text-sm font-mono text-slate-700 truncate w-40" th:text="${header}">Column</span>
                <select th:name="'map_' + ${header}"
                        class="flex-1 px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
                  <option value="">— skip —</option>
                  <option th:each="f : ${fields}" th:if="${!#strings.isEmpty(f)}"
                          th:value="${f}" th:text="${f}"
                          th:selected="${autoMapping.get(header) == f}">field</option>
                </select>
              </div>
            </th:block>
          </div>
        </div>

        <!-- Data preview -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-6">
          <div class="px-6 py-4 border-b border-slate-200">
            <h2 class="font-semibold text-sm">Preview (first 10 rows)</h2>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-slate-200">
                  <th th:each="header : ${headers}"
                      class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-4 py-2 whitespace-nowrap"
                      th:text="${header}">Col</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="row : ${previewRows}" class="border-b border-slate-100">
                  <td th:each="header : ${headers}"
                      class="px-4 py-2 text-slate-600 whitespace-nowrap max-w-[200px] truncate"
                      th:text="${row.get(header)}">val</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <a href="/admin/import" class="text-sm text-slate-500 hover:text-slate-900">Cancel</a>
          <button type="submit"
                  class="inline-flex items-center gap-2 bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-5 py-2 rounded-lg transition"
                  onclick="return confirm('Import all ' + document.querySelector('[data-total]').dataset.total + ' rows as expenses?')">
            <i data-lucide="download" class="w-4 h-4"></i>
            <span>Import <span th:text="${totalRows}" data-total th:attr="data-total=${totalRows}">0</span> rows</span>
          </button>
        </div>
      </form>

    </section>
  </body>
</html>
