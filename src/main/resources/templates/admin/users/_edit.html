<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>

    <div th:fragment="form()"
         th:replace="~{fragments/modal :: shell('Edit user', 'max-w-lg', ~{::#body})}">
      <div id="body">
        <form th:action="@{/admin/users/{id}(id=${user.id}, _csrf=${_csrf.token})}" method="post" class="p-6 space-y-5">

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Email</label>
            <p class="text-sm text-slate-700" th:text="${user.email}">user@example.com</p>
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Name</label>
            <input type="text" name="name" required th:value="${user.name}"
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Roles</label>
            <div class="space-y-2">
              <label th:each="r : ${allRoles}" class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="roleIds" th:value="${r.id}"
                       th:checked="${user.roles.contains(r)}"
                       class="w-4 h-4 rounded border-slate-300 text-[#ea7c28] focus:ring-[#ea7c28]/30">
                <span class="text-sm capitalize" th:text="${r.name}">role</span>
              </label>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Client (optional)</label>
            <select name="clientId"
                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
              <option value="">—</option>
              <option th:each="c : ${clients}" th:value="${c.id}"
                      th:selected="${user.client != null and user.client.id == c.id}"
                      th:text="${c.name}">Client</option>
            </select>
          </div>

          <div class="flex items-center justify-end gap-3 pt-2">
            <button type="button" @click="$dispatch('close-modal')"
                    class="text-sm text-slate-600 hover:text-slate-900 px-4 py-2">Cancel</button>
            <button type="submit"
                    class="bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
              Save
            </button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
