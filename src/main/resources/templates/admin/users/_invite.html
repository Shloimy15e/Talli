<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>

    <div th:fragment="form()"
         th:replace="~{fragments/modal :: shell('Invite user', 'max-w-lg', ~{::#body})}">
      <div id="body"
           x-data="{
             isClient: false,
             clientId: '',
             get showNewClient() { return this.isClient && this.clientId === ''; }
           }">
        <form th:action="@{/admin/users/invite(_csrf=${_csrf.token})}" method="post" class="p-6 space-y-5">

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Name</label>
              <input type="text" name="name" required autofocus placeholder="Jane Smith"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Email</label>
              <input type="email" name="email" required placeholder="jane@example.com"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Roles</label>
            <div class="space-y-2">
              <label th:each="r : ${roles}" class="flex items-center gap-2 cursor-pointer">
                <!-- Client role checkbox wires into Alpine; others are plain. -->
                <input th:if="${r.name == 'client'}" type="checkbox" name="roleIds" th:value="${r.id}"
                       x-on:change="isClient = $el.checked"
                       class="w-4 h-4 rounded border-slate-300 text-[#ea7c28] focus:ring-[#ea7c28]/30">
                <input th:unless="${r.name == 'client'}" type="checkbox" name="roleIds" th:value="${r.id}"
                       class="w-4 h-4 rounded border-slate-300 text-[#ea7c28] focus:ring-[#ea7c28]/30">
                <span class="text-sm capitalize" th:text="${r.name}">role</span>
              </label>
            </div>
          </div>

          <!-- Client selection — visible when client role is checked -->
          <div x-show="isClient" x-cloak class="space-y-4">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Link to client</label>
              <select name="clientId" x-model="clientId"
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
                <option value="">+ New client</option>
                <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.name}">Client</option>
              </select>
            </div>

            <!-- New client fields — visible when "New client" is selected -->
            <div x-show="showNewClient" x-cloak class="space-y-4 border-l-2 border-[#ea7c28]/30 pl-4">
              <p class="text-xs text-slate-500">A new client will be created and linked to this user.</p>
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Client / company name</label>
                <input type="text" name="newClientName" placeholder="Acme Corp"
                       x-bind:required="showNewClient"
                       class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Client email</label>
                  <input type="email" name="newClientEmail" placeholder="billing@acme.com"
                         class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
                </div>
                <div>
                  <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Phone</label>
                  <input type="text" name="newClientPhone" placeholder="(555) 123-4567"
                         class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
                </div>
              </div>
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Billing address</label>
                <textarea name="newClientBillingAddress" rows="2" placeholder="123 Main St, Suite 200&#10;New York, NY 10001"
                          class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"></textarea>
              </div>
            </div>
          </div>

          <p class="text-xs text-slate-500">An email with a setup link will be sent. The user sets their own password.</p>

          <div class="flex items-center justify-end gap-3 pt-2">
            <button type="button" @click="$dispatch('close-modal')"
                    class="text-sm text-slate-600 hover:text-slate-900 px-4 py-2">Cancel</button>
            <button type="submit"
                    class="bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
              Send invite
            </button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
