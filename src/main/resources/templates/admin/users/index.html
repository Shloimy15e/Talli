<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{layout :: head('Users')}"></head>
  <body th:replace="~{layout :: page('users', ~{::section})}">
    <section>

      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Users</h1>
          <p class="text-sm text-slate-500 mt-1"
             th:text="${#lists.size(users)} + ' user' + (${#lists.size(users)} == 1 ? '' : 's')">0 users</p>
        </div>
        <button hx-get="/admin/users/invite" hx-target="#modal" hx-swap="innerHTML"
                class="inline-flex items-center gap-2 bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12h14"/>
          </svg>
          Invite user
        </button>
      </div>

      <!-- Flash -->
      <div th:if="${success}" class="mb-6 px-4 py-3 rounded-lg bg-emerald-50 border border-emerald-200 text-sm text-emerald-800"
           th:text="${success}">ok</div>
      <div th:if="${error}" class="mb-6 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-800"
           th:text="${error}">error</div>

      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
        <table class="w-full">
          <thead>
            <tr class="border-b border-slate-200">
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Name</th>
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Email</th>
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Roles</th>
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Status</th>
              <th class="px-6 py-3 w-44"></th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="u : ${users}" class="border-b border-slate-100 hover:bg-slate-50 transition group">
              <td class="px-6 py-4 font-medium" th:text="${u.name}">Name</td>
              <td class="px-6 py-4 text-slate-600 text-sm" th:text="${u.email}">email</td>
              <td class="px-6 py-4">
                <span th:each="r : ${u.roles}"
                      class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium capitalize mr-1"
                      th:classappend="${r.name == 'admin' ? 'bg-purple-100 text-purple-700' : (r.name == 'client' ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-600')}"
                      th:text="${r.name}">role</span>
              </td>
              <td class="px-6 py-4">
                <span th:if="${u.inviteToken != null}"
                      class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700">Pending invite</span>
                <span th:if="${u.inviteToken == null and u.enabled}"
                      class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-700">Active</span>
                <span th:if="${u.inviteToken == null and !u.enabled}"
                      class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">Disabled</span>
              </td>
              <td class="px-6 py-4 text-right">
                <div class="opacity-0 group-hover:opacity-100 transition flex items-center gap-2 justify-end">
                  <button th:hx-get="@{/admin/users/{id}/edit(id=${u.id})}"
                          hx-target="#modal" hx-swap="innerHTML"
                          class="text-xs text-slate-500 hover:text-slate-900">Edit</button>
                  <form th:if="${u.inviteToken != null}"
                        th:action="@{/admin/users/{id}/resend-invite(id=${u.id})}" method="post" class="inline">
                    <button type="submit" class="text-xs text-[#ea7c28] hover:text-[#d66f20]">Resend</button>
                  </form>
                  <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post" class="inline">
                    <button type="submit" class="text-xs"
                            th:classappend="${u.enabled} ? 'text-amber-600 hover:text-amber-800' : 'text-emerald-600 hover:text-emerald-800'"
                            th:text="${u.enabled} ? 'Disable' : 'Enable'">Toggle</button>
                  </form>
                  <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" class="inline"
                        onsubmit="return confirm('Delete this user?')">
                    <button type="submit" class="text-xs text-red-500 hover:text-red-700">Delete</button>
                  </form>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </section>
  </body>
</html>
