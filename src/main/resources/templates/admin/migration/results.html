<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{layout :: head('Migration Results')}"></head>
  <body th:replace="~{layout :: page('import', ~{::section})}">
    <section>

      <div class="mb-8">
        <h1 class="text-2xl font-semibold tracking-tight">Migration Complete</h1>
      </div>

      <div th:if="${result != null}">
        <!-- Summary tiles -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-6">
          <div class="px-6 py-5">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
              <div class="bg-blue-50 rounded-lg p-4">
                <p class="text-xs uppercase tracking-wider text-blue-600 font-semibold">Clients</p>
                <p class="text-3xl font-semibold text-blue-700 mt-1" th:text="${result.clientsCreated()}">0</p>
              </div>
              <div class="bg-indigo-50 rounded-lg p-4">
                <p class="text-xs uppercase tracking-wider text-indigo-600 font-semibold">Projects</p>
                <p class="text-3xl font-semibold text-indigo-700 mt-1" th:text="${result.projectsCreated()}">0</p>
              </div>
              <div class="bg-cyan-50 rounded-lg p-4">
                <p class="text-xs uppercase tracking-wider text-cyan-600 font-semibold">Time entries</p>
                <p class="text-3xl font-semibold text-cyan-700 mt-1" th:text="${result.timeEntriesCreated()}">0</p>
              </div>
              <div class="bg-emerald-50 rounded-lg p-4">
                <p class="text-xs uppercase tracking-wider text-emerald-600 font-semibold">Invoices</p>
                <p class="text-3xl font-semibold text-emerald-700 mt-1" th:text="${result.invoicesCreated()}">0</p>
              </div>
              <div class="bg-teal-50 rounded-lg p-4">
                <p class="text-xs uppercase tracking-wider text-teal-600 font-semibold">Payments</p>
                <p class="text-3xl font-semibold text-teal-700 mt-1" th:text="${result.paymentsCreated()}">0</p>
              </div>
              <div class="bg-amber-50 rounded-lg p-4">
                <p class="text-xs uppercase tracking-wider text-amber-600 font-semibold">Subscriptions</p>
                <p class="text-3xl font-semibold text-amber-700 mt-1" th:text="${result.subscriptionsCreated()}">0</p>
              </div>
              <div class="bg-purple-50 rounded-lg p-4">
                <p class="text-xs uppercase tracking-wider text-purple-600 font-semibold">Expenses</p>
                <p class="text-3xl font-semibold text-purple-700 mt-1" th:text="${result.expensesCreated()}">0</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Errors -->
        <div th:if="${!result.errors().isEmpty()}"
             class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-6">
          <div class="px-6 py-4 border-b border-slate-200">
            <h2 class="font-semibold text-sm text-red-700">
              Errors (<span th:text="${result.errors().size()}">0</span>)
            </h2>
          </div>
          <ul class="px-6 py-4 space-y-1 max-h-64 overflow-y-auto">
            <li th:each="err : ${result.errors()}" class="text-sm text-red-700 font-mono" th:text="${err}">error</li>
          </ul>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <a href="/dashboard"
           class="inline-flex items-center gap-2 bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
          Go to Dashboard
        </a>
        <a href="/admin/migration" class="text-sm text-slate-500 hover:text-slate-900">Run again</a>
      </div>

    </section>
  </body>
</html>
