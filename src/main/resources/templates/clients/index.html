<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Clients')}"></head>
<body th:replace="~{layout :: page('clients', ~{::section})}">

<section x-data="{ search: '' }">

    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-semibold tracking-tight">Clients</h1>
            <p class="text-sm text-slate-500 mt-1" th:text="${#lists.size(clients)} + ' client' + (${#lists.size(clients)} == 1 ? '' : 's')">0 clients</p>
        </div>
        <button hx-get="/clients/new" hx-target="#modal" hx-swap="innerHTML"
                sec:authorize="hasAuthority('manage-clients')"
                class="inline-flex items-center gap-2 bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
            <i data-lucide="plus" class="w-4 h-4"></i>
            New Client
        </button>
    </div>

    <!-- KPI tiles -->
    <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-xl border border-slate-200 p-5">
            <p class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Clients</p>
            <p class="text-3xl font-semibold mt-2" th:text="${#lists.size(clients)}">0</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-5">
            <p class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Total billed</p>
            <p class="text-3xl font-semibold mt-2 font-mono tabular-nums"
               th:text="'$' + ${#numbers.formatDecimal(totalBilled, 1, 'COMMA', 2, 'POINT')}">$0.00</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-5">
            <p class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Collected</p>
            <p class="text-3xl font-semibold mt-2 font-mono tabular-nums text-emerald-600"
               th:text="'$' + ${#numbers.formatDecimal(totalCollected, 1, 'COMMA', 2, 'POINT')}">$0.00</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-5">
            <p class="text-xs uppercase tracking-wider text-slate-500 font-semibold">Outstanding</p>
            <p class="text-3xl font-semibold mt-2 font-mono tabular-nums"
               th:classappend="${totalOutstanding.signum() > 0} ? 'text-[#ea7c28]' : 'text-slate-700'"
               th:text="'$' + ${#numbers.formatDecimal(totalOutstanding, 1, 'COMMA', 2, 'POINT')}">$0.00</p>
        </div>
    </div>

    <!-- Search -->
    <div th:unless="${#lists.isEmpty(clients)}" class="mb-4">
        <input type="text" x-model="search" placeholder="Search clients..."
               class="w-full max-w-xs px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
    </div>

    <div th:if="${#lists.isEmpty(clients)}" class="bg-white rounded-xl border border-slate-200 p-12 text-center">
        <p class="text-slate-500">No clients yet.</p>
        <button hx-get="/clients/new" hx-target="#modal"
                sec:authorize="hasAuthority('manage-clients')"
                class="text-[#ea7c28] hover:underline mt-2">Add your first client</button>
    </div>

    <div th:unless="${#lists.isEmpty(clients)}" class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
        <table class="w-full">
            <thead>
                <tr class="border-b border-slate-200">
                    <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Name</th>
                    <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Email</th>
                    <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Terms</th>
                    <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Notes</th>
                    <th class="px-6 py-3 w-32"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="client : ${clients}"
                    class="border-b border-slate-100 hover:bg-slate-50 transition group"
                    th:data-name="${client.name}" th:data-email="${client.email ?: ''}"
                    x-show="!search || $el.dataset.name.toLowerCase().includes(search.toLowerCase()) || $el.dataset.email.toLowerCase().includes(search.toLowerCase())">
                    <td class="px-6 py-4 font-medium">
                        <a th:href="@{/clients/{id}(id=${client.id})}"
                           class="hover:text-[#ea7c28] hover:underline" th:text="${client.name}">Name</a>
                    </td>
                    <td class="px-6 py-4 text-slate-600 text-sm" th:text="${client.email ?: '—'}">email</td>
                    <td class="px-6 py-4 text-slate-600 text-sm" th:text="'Net ' + ${client.paymentTermsDays}">Net 30</td>
                    <td class="px-6 py-4 text-slate-500 text-sm truncate max-w-xs" th:text="${client.notes ?: ''}"></td>
                    <td class="px-6 py-4 text-right">
                        <div sec:authorize="hasAuthority('manage-clients')"
                             class="opacity-0 group-hover:opacity-100 transition flex items-center gap-2 justify-end">
                            <button th:hx-get="@{/clients/{id}/edit(id=${client.id})}" hx-target="#modal"
                                    class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-900">
                                <i data-lucide="pencil" class="w-3 h-3"></i> Edit</button>
                            <form th:action="@{/clients/{id}/delete(id=${client.id})}" method="post" class="inline"
                                  onsubmit="return confirm('Delete this client?')">
                                <button type="submit" class="inline-flex items-center gap-1 text-xs text-red-500 hover:text-red-700">
                                    <i data-lucide="trash-2" class="w-3 h-3"></i> Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</section>
</body>
</html>
