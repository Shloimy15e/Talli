<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Clients')}"></head>
<body th:replace="~{layout :: page('clients', ~{::section})}">

<!-- Only this section gets injected into the layout's main area -->
<section>

    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-semibold tracking-tight">Clients</h1>
            <p class="text-sm text-slate-500 mt-1" th:text="${#lists.size(clients)} + ' client' + (${#lists.size(clients)} == 1 ? '' : 's')">0 clients</p>
        </div>
        <button hx-get="/clients/new" hx-target="#modal" hx-swap="innerHTML"
                sec:authorize="hasAuthority('manage-clients')"
                class="inline-flex items-center gap-2 bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12h14"/></svg>
            New Client
        </button>
    </div>

    <div th:if="${#lists.isEmpty(clients)}" class="bg-white rounded-xl border border-slate-200 p-12 text-center">
        <p class="text-slate-500">No clients yet.</p>
        <button hx-get="/clients/new" hx-target="#modal"
                class="text-[#ea7c28] hover:underline mt-2">Add your first client</button>
    </div>

    <div th:unless="${#lists.isEmpty(clients)}" class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
        <table class="w-full">
            <thead>
                <tr class="border-b border-slate-200">
                    <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Name</th>
                    <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Email</th>
                    <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Notes</th>
                    <th class="px-6 py-3 w-32"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="client : ${clients}" class="border-b border-slate-100 hover:bg-slate-50 transition group">
                    <td class="px-6 py-4 font-medium">
                        <a th:href="@{/clients/{id}(id=${client.id})}"
                           class="hover:text-[#ea7c28]" th:text="${client.name}">Name</a>
                    </td>
                    <td class="px-6 py-4 text-slate-600" th:text="${client.email}">email</td>
                    <td class="px-6 py-4 text-slate-500 text-sm" th:text="${client.notes}">notes</td>
                    <td class="px-6 py-4 text-right">
                        <div class="opacity-0 group-hover:opacity-100 transition flex items-center gap-2 justify-end">
                            <button th:hx-get="@{/clients/{id}/edit(id=${client.id})}" hx-target="#modal"
                                    sec:authorize="hasAuthority('manage-clients')"
                                    class="text-xs text-slate-500 hover:text-slate-900">Edit</button>
                            <form th:action="@{/clients/{id}/delete(id=${client.id})}" method="post" class="inline"
                                  sec:authorize="hasAuthority('manage-clients')"
                                  onsubmit="return confirm('Delete this client?')">
                                <button type="submit" class="text-xs text-red-500 hover:text-red-700">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</section>
</body>
</html>
