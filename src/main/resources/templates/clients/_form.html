<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>

    <div th:fragment="form(client, action, title)"
         th:replace="~{fragments/modal :: shell(${title}, 'max-w-lg', ~{::#body})}">
      <div id="body">
        <form th:action="${action}" th:object="${client}" method="post" class="p-6 space-y-5">

          <div>
            <label for="name" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Name</label>
            <input type="text" id="name" th:field="*{name}" required autofocus
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Email</label>
              <input type="email" id="email" th:field="*{email}"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
            <div>
              <label for="phone" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Phone</label>
              <input type="text" id="phone" th:field="*{phone}"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
          </div>

          <div>
            <label for="billingAddress" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Billing Address</label>
            <textarea id="billingAddress" th:field="*{billingAddress}" rows="3"
                      placeholder="Street, city, state, postal code, country"
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"></textarea>
          </div>

          <div>
            <label for="taxId" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Tax ID</label>
            <input type="text" id="taxId" th:field="*{taxId}"
                   placeholder="EIN, VAT, or company registration number"
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>

          <div>
            <label for="paymentTermsDays" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Payment Terms</label>
            <div class="flex items-center gap-2">
              <span class="text-sm text-slate-500">Net</span>
              <input type="number" id="paymentTermsDays" th:field="*{paymentTermsDays}" min="0" max="365"
                     class="w-24 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
              <span class="text-sm text-slate-500">days</span>
            </div>
            <p class="text-[11px] text-slate-400 mt-1">Net 30 is US B2B services standard. Used for invoice due dates.</p>
          </div>

          <!-- Reminder settings -->
          <div class="border-t border-slate-200 pt-4">
            <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-3">Payment reminders</p>
            <label class="flex items-center gap-2 cursor-pointer mb-3">
              <input type="checkbox" th:field="*{remindersEnabled}"
                     class="w-4 h-4 rounded border-slate-300 text-[#ea7c28] focus:ring-[#ea7c28]/30">
              <span class="text-sm text-slate-700">Auto-send payment reminders for overdue invoices</span>
            </label>
            <div class="flex items-center gap-2">
              <span class="text-sm text-slate-500">Every</span>
              <input type="number" th:field="*{reminderIntervalDays}" min="1" max="365" placeholder="—"
                     class="w-24 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
              <span class="text-sm text-slate-500">days (blank = use global default)</span>
            </div>
          </div>

          <div>
            <label for="notes" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Notes</label>
            <textarea id="notes" th:field="*{notes}" rows="3"
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"></textarea>
          </div>

          <div class="flex items-center justify-end gap-3 pt-2">
            <button type="button" @click="$dispatch('close-modal')"
                    class="text-sm text-slate-600 hover:text-slate-900 px-4 py-2">Cancel</button>
            <button type="submit"
                    class="bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
              Save
            </button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
