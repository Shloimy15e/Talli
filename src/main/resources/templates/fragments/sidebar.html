<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <!-- Fragment: sidebar(active)
     Pass the active section name from the page so we can highlight it.
     Usage: <aside th:replace="~{fragments/sidebar :: sidebar('clients')}"></aside>
-->
    <aside
      th:fragment="sidebar(active)"
      class="w-56 h-screen bg-[#121826] text-slate-300 flex flex-col px-3 py-5 fixed left-0 top-0"
    >
      <!-- Logo -->
      <div class="flex items-center gap-2 px-2 mb-1">
        <img src="/logo.svg" alt="Talli" class="w-6 h-6" />
        <span class="text-white font-bold text-base">Talli</span>
      </div>
      <p class="text-xs text-slate-500 px-2 mb-8">Internal PSA</p>

      <!-- Section header -->
      <p
        class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider px-2 mb-2"
      >
        Workspace
      </p>

      <!-- Nav items -->
      <nav class="space-y-0.5">
        <!-- th:classappend adds classes conditionally — like :class in Vue -->
        <a
          th:href="@{/dashboard}"
          th:classappend="${active == 'dashboard'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
            th:style="${active == 'dashboard'} ? 'color: #ea7c28'"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M4 6a2 2 0 012-2h4a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h4a2 2 0 012 2v4a2 2 0 01-2 2h-4a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h4a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h4a2 2 0 012 2v4a2 2 0 01-2 2h-4a2 2 0 01-2-2v-4z"
            />
          </svg>
          Dashboard
        </a>
        <a
          th:href="@{/clients}"
          th:classappend="${active == 'clients'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
            th:style="${active == 'clients'} ? 'color: #ea7c28'"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-5.13a4 4 0 11-8 0 4 4 0 018 0zm6 3a3 3 0 11-6 0 3 3 0 016 0z"
            />
          </svg>
          Clients
        </a>

        <a
          th:href="@{/projects}"
          th:classappend="${active == 'projects'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
            th:style="${active == 'projects'} ? 'color: #ea7c28'"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
          Projects
        </a>

        <a
          th:href="@{/time}"
          th:classappend="${active == 'time'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
            th:style="${active == 'time'} ? 'color: #ea7c28'"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          Time
        </a>

        <span class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-600 cursor-not-allowed">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          Invoices
          <span class="ml-auto text-[9px] font-semibold uppercase tracking-wider text-slate-600 bg-[#222a3c] px-1.5 py-0.5 rounded">Soon</span>
        </span>

        <a
          th:href="@{/expenses}"
          th:classappend="${active == 'expenses'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
            th:style="${active == 'expenses'} ? 'color: #ea7c28'"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"
            />
          </svg>
          Expenses
        </a>

        <a
          th:href="@{/subscriptions}"
          th:classappend="${active == 'subscriptions'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
            th:style="${active == 'subscriptions'} ? 'color: #ea7c28'"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
            />
          </svg>
          Subscriptions
        </a>

        <a
          th:href="@{/emails}"
          th:classappend="${active == 'emails'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
            th:style="${active == 'emails'} ? 'color: #ea7c28'"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
            />
          </svg>
          Emails
        </a>
      </nav>

      <!-- Spacer pushes account section to bottom -->
      <div class="flex-1"></div>

      <!-- Divider -->
      <div class="border-t border-[#222a3c] my-2"></div>

      <!-- Account -->
      <a th:href="@{/profile}"
         th:classappend="${active == 'profile'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
             th:style="${active == 'profile'} ? 'color: #ea7c28'">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        Profile
      </a>

      <form th:action="@{/logout}" method="post" class="w-full">
        <button type="submit"
                class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-[#1c2434] hover:text-slate-200 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sign out
        </button>
      </form>

      <p class="text-[10px] text-slate-600 px-2 mt-2">v1.0.0</p>
    </aside>
  </body>
</html>
