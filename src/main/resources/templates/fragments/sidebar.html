<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <body>
    <aside
      th:fragment="sidebar(active)"
      class="w-56 h-screen bg-[#121826] text-slate-300 flex flex-col px-3 py-5 fixed left-0 top-0"
    >
      <!-- Logo -->
      <div class="flex items-center gap-2 px-2 mb-8">
        <img src="/logo.svg" alt="Talli" class="w-7 h-7" />
        <span class="text-white font-semibold text-[15px]">Talli</span>
      </div>

      <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider px-2 mb-2">Workspace</p>

      <nav class="space-y-0.5">
        <a sec:authorize="hasAuthority('view-dashboard')"
           th:href="@{/dashboard}"
           th:classappend="${active == 'dashboard'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition">
          <i data-lucide="layout-dashboard" class="w-5 h-5" th:style="${active == 'dashboard'} ? 'color: #ea7c28'"></i>
          Dashboard
        </a>
        <a sec:authorize="hasAuthority('view-clients')"
           th:href="@{/clients}"
           th:classappend="${active == 'clients'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition">
          <i data-lucide="users" class="w-5 h-5" th:style="${active == 'clients'} ? 'color: #ea7c28'"></i>
          Clients
        </a>
        <a sec:authorize="hasAuthority('view-projects')"
           th:href="@{/projects}"
           th:classappend="${active == 'projects'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition">
          <i data-lucide="folder-kanban" class="w-5 h-5" th:style="${active == 'projects'} ? 'color: #ea7c28'"></i>
          Projects
        </a>
        <a sec:authorize="hasAuthority('view-time')"
           th:href="@{/time}"
           th:classappend="${active == 'time'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition">
          <i data-lucide="clock" class="w-5 h-5" th:style="${active == 'time'} ? 'color: #ea7c28'"></i>
          Time
        </a>
        <a sec:authorize="hasAuthority('view-invoices')"
           th:href="@{/invoices}"
           th:classappend="${active == 'invoices'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition">
          <i data-lucide="file-text" class="w-5 h-5" th:style="${active == 'invoices'} ? 'color: #ea7c28'"></i>
          Invoices
        </a>
        <a sec:authorize="hasAuthority('view-expenses')"
           th:href="@{/expenses}"
           th:classappend="${active == 'expenses'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition">
          <i data-lucide="receipt" class="w-5 h-5" th:style="${active == 'expenses'} ? 'color: #ea7c28'"></i>
          Expenses
        </a>
        <a sec:authorize="hasAuthority('view-expenses')"
           th:href="@{/subscriptions}"
           th:classappend="${active == 'subscriptions'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition">
          <i data-lucide="repeat" class="w-5 h-5" th:style="${active == 'subscriptions'} ? 'color: #ea7c28'"></i>
          Subscriptions
        </a>
        <a sec:authorize="hasRole('admin')"
           th:href="@{/emails}"
           th:classappend="${active == 'emails'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition">
          <i data-lucide="mail" class="w-5 h-5" th:style="${active == 'emails'} ? 'color: #ea7c28'"></i>
          Emails
        </a>
        <a sec:authorize="hasAuthority('view-reports')"
           th:href="@{/reports}"
           th:classappend="${active == 'reports'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition">
          <i data-lucide="bar-chart-3" class="w-5 h-5" th:style="${active == 'reports'} ? 'color: #ea7c28'"></i>
          Reports
        </a>
      </nav>

      <!-- Admin section -->
      <div sec:authorize="hasAuthority('manage-users')" class="mt-6">
        <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider px-2 mb-2">Admin</p>
        <nav class="space-y-0.5">
          <a th:href="@{/admin/users}"
             th:classappend="${active == 'users'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
             class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition">
            <i data-lucide="shield" class="w-5 h-5" th:style="${active == 'users'} ? 'color: #ea7c28'"></i>
            Users
          </a>
          <a th:href="@{/admin/import}"
             th:classappend="${active == 'import'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
             class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition">
            <i data-lucide="upload" class="w-5 h-5" th:style="${active == 'import'} ? 'color: #ea7c28'"></i>
            Import
          </a>
        </nav>
      </div>

      <div class="flex-1"></div>
      <div class="border-t border-[#222a3c] my-2"></div>

      <a th:href="@{/profile}"
         th:classappend="${active == 'profile'} ? 'bg-[#222a3c] text-white' : 'text-slate-400 hover:bg-[#1c2434] hover:text-slate-200'"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition">
        <i data-lucide="user" class="w-5 h-5" th:style="${active == 'profile'} ? 'color: #ea7c28'"></i>
        Profile
      </a>

      <form th:action="@{/logout}" method="post" class="w-full">
        <button type="submit"
                class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-[#1c2434] hover:text-slate-200 transition">
          <i data-lucide="log-out" class="w-5 h-5"></i>
          Sign out
        </button>
      </form>

      <p class="text-[10px] text-slate-600 px-2 mt-2">v1.0.0</p>
    </aside>
  </body>
</html>
