<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <!-- Fragment 1: head (just the <head>) -->
  <head th:fragment="head(title)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title}">Talli</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>

    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Tippy.js for tooltips -->
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/themes/light-border.css" />

    <!-- Device-local datetime + timeago rendering (must load before Tippy init
         so data-tippy-content is populated in device tz before tooltips attach). -->
    <script src="/js/time.js"></script>
    <script>
      function initTooltips() {
        if (window.tippy) {
          tippy('[data-tippy-content]', {
            theme: 'light-border',
            arrow: true,
            animation: 'shift-away',
            delay: [200, 0],
          });
        }
      }
      function initLucide() { if (window.lucide) lucide.createIcons(); }
      document.addEventListener('DOMContentLoaded', () => {
        if (window.renderTimes) window.renderTimes();
        initTooltips();
        initLucide();
      });
      document.addEventListener('htmx:afterSwap', (e) => {
        if (window.renderTimes) window.renderTimes(e.target);
        initTooltips();
        initLucide();
      });
    </script>

    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />

    <style>
      html {
        font-family: "Inter", sans-serif;
      }
      @supports (font-variation-settings: normal) {
        html {
          font-family: "Inter var", sans-serif;
        }
      }
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>

  <!-- Fragment 2: page — the full body shell with sidebar + content slot
     Pass (active, content) and the page's content gets injected where we put ${content} -->
  <body
    th:fragment="page(active, content)"
    class="bg-slate-50 text-slate-900 antialiased"
    x-data="{ modalOpen: false }"
    @close-modal.window="modalOpen = false; setTimeout(() => document.getElementById('modal').innerHTML = '', 200)"
    @htmx:after-swap.window="modalOpen = true"
  >
    <aside th:replace="~{fragments/sidebar :: sidebar(${active})}"></aside>

    <div class="ml-56">
      <main class="max-w-7xl mx-auto px-8 py-12 overflow-auto">
        <!-- The page's content is slotted here -->
        <div th:replace="${content}"></div>
      </main>
    </div>

    <!-- Modal mount point — shared across all pages -->
    <div id="modal"
         x-show="modalOpen"
         x-transition:enter="ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         x-cloak></div>
  </body>
</html>
