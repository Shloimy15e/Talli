<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>

    <div th:fragment="form(expense, action, title, clients, projects, receipts)"
         th:replace="~{fragments/modal :: shell(${title}, 'max-w-xl', ~{::#body})}">
      <div id="body">
        <form th:action="@{${action}(_csrf=${_csrf.token})}" method="post" enctype="multipart/form-data" class="p-6 space-y-5">

          <!-- Date + amount + currency -->
          <div class="grid grid-cols-3 gap-4">
            <div>
              <label for="incurredOn" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Date</label>
              <input type="date" id="incurredOn" name="incurredOn" required
                     th:value="${expense.incurredOn}"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
            <div>
              <label for="amount" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Amount</label>
              <input type="number" id="amount" name="amount" step="0.01" min="0" required
                     th:value="${expense.amount}" placeholder="0.00"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
            <div>
              <label for="currency" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Currency</label>
              <input type="text" id="currency" name="currency" maxlength="3"
                     th:value="${expense.currency ?: 'USD'}" placeholder="USD"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
          </div>

          <!-- Vendor + category -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="vendor" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Vendor</label>
              <input type="text" id="vendor" name="vendor"
                     th:value="${expense.vendor}" placeholder="e.g., Amazon"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
            <div>
              <label for="category" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Category</label>
              <select id="category" name="category" required
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
                <option th:each="c : ${ {'software', 'hardware', 'travel', 'meals', 'contractors', 'office', 'marketing', 'taxes', 'other'} }"
                        th:value="${c}" th:text="${c}" th:selected="${expense.category == c}">software</option>
              </select>
            </div>
          </div>

          <!-- Description -->
          <div>
            <label for="description" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Description</label>
            <textarea id="description" name="description" rows="2"
                      placeholder="What was this for?"
                      th:text="${expense.description}"
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"></textarea>
          </div>

          <!-- Payment method -->
          <div>
            <label for="paymentMethod" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Payment method</label>
            <input type="text" id="paymentMethod" name="paymentMethod"
                   th:value="${expense.paymentMethod}" placeholder="e.g., Amex 1234"
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>

          <!-- Receipts -->
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Receipts</label>

            <ul th:if="${receipts != null and not #lists.isEmpty(receipts)}" class="space-y-1 mb-3">
              <li th:each="r : ${receipts}"
                  class="flex items-center justify-between px-3 py-2 bg-slate-50 rounded-lg text-sm">
                <a th:href="@{/media/{id}(id=${r.id})}" target="_blank"
                   class="text-[#ea7c28] hover:underline truncate flex-1">
                  <span th:text="${r.filename}">receipt.pdf</span>
                  <span class="text-slate-400 text-xs ml-2"
                        th:text="${#numbers.formatDecimal(r.sizeBytes / 1024.0, 1, 'COMMA', 1, 'POINT') + ' KB'}">12.3 KB</span>
                </a>
                <button type="submit" formmethod="post" formnovalidate
                        th:formaction="@{/media/{id}/delete(id=${r.id})}"
                        class="text-slate-400 hover:text-red-600 text-xs ml-3"
                        onclick="return confirm('Delete this receipt?')">Delete</button>
              </li>
            </ul>

            <input type="file" id="receipt" name="receipt"
                   accept="image/*,application/pdf"
                   class="w-full text-sm text-slate-700 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-sm file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 cursor-pointer">
            <p class="text-xs text-slate-400 mt-1">Attach a photo or PDF. Max 10MB.</p>
          </div>

          <!-- Optional tagging -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="clientId" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Client (optional)</label>
              <select id="clientId" name="clientId"
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
                <option value="" th:selected="${expense.client == null}">—</option>
                <option th:each="c : ${clients}" th:value="${c.id}"
                        th:selected="${expense.client != null and expense.client.id == c.id}"
                        th:text="${c.name}">Client</option>
              </select>
            </div>
            <div>
              <label for="projectId" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Project (optional)</label>
              <select id="projectId" name="projectId"
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
                <option value="" th:selected="${expense.project == null}">—</option>
                <option th:each="p : ${projects}" th:value="${p.id}"
                        th:selected="${expense.project != null and expense.project.id == p.id}"
                        th:text="${p.name} + ' · ' + ${p.client.name}">Project</option>
              </select>
            </div>
          </div>

          <!-- Billable flag — expense flows through to client invoice at cost -->
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="billable" value="true"
                   th:checked="${expense.billable}"
                   class="w-4 h-4 rounded border-slate-300 text-[#ea7c28] focus:ring-[#ea7c28]/30">
            <span class="text-sm text-slate-700">Billable — pass through to client invoice</span>
          </label>

          <div class="flex items-center justify-end gap-3 pt-2">
            <button type="button" @click="$dispatch('close-modal')"
                    class="text-sm text-slate-600 hover:text-slate-900 px-4 py-2">Cancel</button>
            <button type="submit"
                    class="bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
              Save
            </button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
