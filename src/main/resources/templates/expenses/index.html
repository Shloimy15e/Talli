<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head th:replace="~{layout :: head('Expenses')}"></head>
  <body th:replace="~{layout :: page('expenses', ~{::section})}">
    <section>

      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Expenses</h1>
          <p class="text-sm text-slate-500 mt-1">
            <span th:text="${#temporals.format(monthLabel, 'MMMM yyyy')}">This month</span>
            <span class="text-slate-300 mx-1">·</span>
            <span class="font-mono" th:text="'$' + ${#numbers.formatDecimal(monthTotal, 1, 'COMMA', 2, 'POINT')}">$0.00</span>
          </p>
        </div>
        <button sec:authorize="hasAuthority('manage-expenses')"
                hx-get="/expenses/new" hx-target="#modal" hx-swap="innerHTML"
                class="inline-flex items-center gap-2 bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
          <i data-lucide="plus" class="w-4 h-4"></i>
          Log Expense
        </button>
      </div>

      <!-- Empty state -->
      <div th:if="${#lists.isEmpty(expenses)}" class="bg-white rounded-xl border border-slate-200 p-12 text-center">
        <p class="text-slate-500">No expenses logged yet.</p>
        <button hx-get="/expenses/new" hx-target="#modal" class="text-[#ea7c28] hover:underline mt-2">Log your first expense</button>
      </div>

      <!-- List -->
      <div th:unless="${#lists.isEmpty(expenses)}" class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
        <table class="w-full">
          <thead>
            <tr class="border-b border-slate-200">
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Date</th>
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Vendor</th>
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Category</th>
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Amount</th>
              <th class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3">Source</th>
              <th class="px-6 py-3 w-20"></th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="e : ${expenses}" class="border-b border-slate-100 hover:bg-slate-50 transition group">
              <td class="px-6 py-4 text-sm text-slate-600 tabular-nums"
                  th:text="${#temporals.format(e.incurredOn, 'MMM d, yyyy')}">Apr 14, 2026</td>
              <td class="px-6 py-4 text-sm">
                <div class="font-medium" th:text="${e.vendor} ?: '—'">Vendor</div>
                <div th:if="${e.description}" class="text-xs text-slate-500" th:text="${e.description}">description</div>
              </td>
              <td class="px-6 py-4 text-sm text-slate-600 capitalize" th:text="${e.category}">software</td>
              <td class="px-6 py-4 font-mono text-sm tabular-nums"
                  th:text="${e.currency} + ' ' + ${#numbers.formatDecimal(e.amount, 1, 'COMMA', 2, 'POINT')}">USD 0.00</td>
              <td class="px-6 py-4 text-xs">
                <span th:if="${e.subscription != null}"
                      class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-[#ea7c28]/10 text-[#ea7c28]">
                  Subscription
                </span>
                <span th:if="${e.subscription == null}" class="text-slate-400">Manual</span>
              </td>
              <td class="px-6 py-4 text-right">
                <div sec:authorize="hasAuthority('manage-expenses')"
                     class="opacity-0 group-hover:opacity-100 transition flex items-center gap-2 justify-end">
                  <button th:hx-get="@{/expenses/{id}/edit(id=${e.id})}" hx-target="#modal"
                          class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-900">
                    <i data-lucide="pencil" class="w-3 h-3"></i> Edit</button>
                  <form th:action="@{/expenses/{id}/delete(id=${e.id})}" method="post" class="inline"
                        onsubmit="return confirm('Delete this expense?')">
                    <button type="submit" class="inline-flex items-center gap-1 text-xs text-red-500 hover:text-red-700">
                      <i data-lucide="trash-2" class="w-3 h-3"></i> Delete</button>
                  </form>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div th:if="${page != null and page.totalPages > 1}"
           class="mt-4 flex items-center justify-between text-sm">
        <p class="text-slate-500">
          Showing <span th:text="${page.number * page.size + 1}">1</span>–<span th:text="${page.number * page.size + page.numberOfElements}">25</span>
          of <span th:text="${page.totalElements}">100</span>
        </p>
        <div class="flex items-center gap-1">
          <a th:if="${page.number > 0}"
             th:href="@{/expenses(page=${page.number - 1})}"
             class="px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-700">Prev</a>
          <span th:if="${page.number == 0}"
                class="px-3 py-1.5 rounded-lg border border-slate-100 text-slate-300 cursor-not-allowed">Prev</span>

          <th:block th:each="p : ${#numbers.sequence(0, page.totalPages - 1)}">
            <a th:if="${p != page.number}"
               th:href="@{/expenses(page=${p})}"
               th:text="${p + 1}"
               class="px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-700">1</a>
            <span th:if="${p == page.number}"
                  th:text="${p + 1}"
                  class="px-3 py-1.5 rounded-lg bg-[#ea7c28] text-white font-medium">1</span>
          </th:block>

          <a th:if="${page.number < page.totalPages - 1}"
             th:href="@{/expenses(page=${page.number + 1})}"
             class="px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-700">Next</a>
          <span th:if="${page.number >= page.totalPages - 1}"
                class="px-3 py-1.5 rounded-lg border border-slate-100 text-slate-300 cursor-not-allowed">Next</span>
        </div>
      </div>

    </section>
  </body>
</html>
