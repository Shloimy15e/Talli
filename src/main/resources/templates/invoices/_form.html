<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>

    <div th:fragment="form(form, action, title, clients, projects)"
         class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm"
         @click.self="$dispatch('close-modal')">

      <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl mx-4 max-h-[90vh] overflow-y-auto"
           x-transition:enter="ease-out duration-200"
           x-transition:enter-start="opacity-0 scale-95"
           x-transition:enter-end="opacity-100 scale-100"
           x-data="{
             rows: [{}],
             addRow() { this.rows.push({}); },
             removeRow(idx) { if (this.rows.length > 1) this.rows.splice(idx, 1); }
           }">

        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 sticky top-0 bg-white z-10">
          <h2 class="text-lg font-semibold" th:text="${title}">Invoice</h2>
          <button type="button" @click="$dispatch('close-modal')"
                  class="text-slate-400 hover:text-slate-700 text-xl leading-none">×</button>
        </div>

        <form th:action="@{${action}(_csrf=${_csrf.token})}" method="post" enctype="multipart/form-data" class="p-6 space-y-5">

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Reference</label>
              <input type="text" name="reference" required th:value="${form.reference}"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28] font-mono">
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Client</label>
              <select name="clientId" required
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
                <option value="">—</option>
                <option th:each="c : ${clients}" th:value="${c.id}"
                        th:selected="${form.clientId != null and form.clientId == c.id}"
                        th:text="${c.name}">Client</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-4 gap-4">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Issued</label>
              <input type="date" name="issuedAt" required th:value="${form.issuedAt}"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Due</label>
              <input type="date" name="dueAt" th:value="${form.dueAt}"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Period Start</label>
              <input type="date" name="periodStart" th:value="${form.periodStart}"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Period End</label>
              <input type="date" name="periodEnd" th:value="${form.periodEnd}"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
          </div>

          <div class="grid grid-cols-3 gap-4">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Currency</label>
              <input type="text" name="currency" maxlength="3" th:value="${form.currency ?: 'USD'}"
                     class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
            </div>
            <div class="col-span-2">
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Status</label>
              <select name="status"
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
                <option th:each="s : ${ {'unpaid', 'paid', 'overdue', 'void'} }"
                        th:value="${s}" th:text="${s}"
                        th:selected="${form.status == s}">unpaid</option>
              </select>
            </div>
          </div>

          <!-- Line items -->
          <div>
            <div class="flex items-center justify-between mb-3">
              <label class="text-xs font-semibold uppercase tracking-wider text-slate-500">Line Items</label>
              <button type="button" @click="addRow()"
                      class="text-xs text-[#ea7c28] hover:underline font-medium">+ Add item</button>
            </div>

            <template x-for="(_, idx) in rows" :key="idx">
              <div class="grid grid-cols-12 gap-2 mb-2 items-start">
                <select :name="`items[${idx}].projectId`"
                        class="col-span-3 px-2 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30">
                  <option value="">—</option>
                  <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name}">Project</option>
                </select>
                <input type="text" :name="`items[${idx}].description`" placeholder="Description"
                       class="col-span-4 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30">
                <input type="number" step="0.01" :name="`items[${idx}].unitCount`" placeholder="Qty"
                       class="col-span-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30">
                <input type="text" :name="`items[${idx}].unit`" placeholder="hr"
                       class="col-span-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30">
                <input type="number" step="0.01" :name="`items[${idx}].unitPrice`" placeholder="Price"
                       class="col-span-2 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30">
                <button type="button" @click="removeRow(idx)"
                        class="col-span-1 text-slate-400 hover:text-red-600 text-lg leading-none py-2">×</button>
              </div>
            </template>
          </div>

          <!-- Attachments -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Invoice document</label>
              <input type="file" name="invoiceDoc" accept="image/*,application/pdf"
                     class="w-full text-xs text-slate-700 file:mr-2 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-xs file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 cursor-pointer">
              <p class="text-[10px] text-slate-400 mt-1">Optional — PDF or image of the invoice</p>
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Payment proof</label>
              <input type="file" name="paymentProof" accept="image/*,application/pdf"
                     class="w-full text-xs text-slate-700 file:mr-2 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-xs file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 cursor-pointer">
              <p class="text-[10px] text-slate-400 mt-1">Optional — receipt from client</p>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Notes</label>
            <textarea name="notes" rows="2" th:text="${form.notes}"
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"></textarea>
          </div>

          <div class="flex items-center justify-end gap-3 pt-2">
            <button type="button" @click="$dispatch('close-modal')"
                    class="text-sm text-slate-600 hover:text-slate-900 px-4 py-2">Cancel</button>
            <button type="submit"
                    class="bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
              Save
            </button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
