<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{layout :: head('Emails')}"></head>
  <body th:replace="~{layout :: page('emails', ~{::section})}">
    <section>
      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Emails</h1>
          <p
            class="text-sm text-slate-500 mt-1"
            th:text="${#lists.size(emails)} + ' sent'"
          >
            0 sent
          </p>
        </div>
        <button
          hx-get="/emails/new"
          hx-target="#modal"
          hx-swap="innerHTML"
          class="inline-flex items-center gap-2 bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition"
        >
          Compose
        </button>
      </div>

      <div
        th:if="${#lists.isEmpty(emails)}"
        class="bg-white rounded-xl border border-slate-200 p-12 text-center"
      >
        <p class="text-slate-500">No emails sent yet.</p>
      </div>

      <div
        th:unless="${#lists.isEmpty(emails)}"
        class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm"
      >
        <table class="w-full">
          <thead>
            <tr class="border-b border-slate-200">
              <th
                class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3"
              >
                To
              </th>
              <th
                class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3"
              >
                Subject
              </th>
              <th
                class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3"
              >
                Sent
              </th>
              <th
                class="text-left text-xs font-semibold text-slate-500 uppercase tracking-wider px-6 py-3"
              >
                Status
              </th>
            </tr>
          </thead>
          <tbody>
            <tr
              th:each="e : ${emails}"
              class="border-b border-slate-100 hover:bg-slate-50 transition"
            >
              <td class="px-6 py-4 text-sm">
                <span th:text="${e.toAddress}">email</span>
                <span
                  th:if="${e.client}"
                  class="block text-xs text-slate-500"
                  th:text="${e.client.name}"
                  >Client</span
                >
              </td>
              <td class="px-6 py-4 text-sm font-medium" th:text="${e.subject}">
                Subject
              </td>
              <td
                class="px-6 py-4 text-sm text-slate-500"
                th:text="${e.sentAt != null ? #temporals.format(e.sentAt, 'MMM d, HH:mm') : '—'}"
              >
                Mar 12
              </td>
              <td class="px-6 py-4">
                <span
                  th:if="${e.status == 'sent'}"
                  class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700"
                  >Sent</span
                >
                <span
                  th:if="${e.status == 'failed'}"
                  class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700 cursor-default"
                  th:attr="data-tippy-content=${e.errorMessage}"
                  >Failed</span
                >

                <span
                  th:if="${e.status == 'pending'}"
                  class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600"
                  >Pending</span
                >
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </body>
</html>
