<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="form"
         class="fixed inset-0 z-50 flex items-start justify-center bg-slate-900/40 backdrop-blur-sm overflow-y-auto py-10"
         @click.self="$dispatch('close-modal')">

      <style>
        .compose-editor { min-height: 16rem; resize: vertical; overflow: auto; }
        .compose-editor:focus { outline: none; }
        .compose-editor:empty::before { content: attr(data-placeholder); color: #94a3b8; pointer-events: none; }
        .compose-editor a { color: #ea7c28; text-decoration: underline; }
        .compose-editor h1 { font-size: 1.5rem; font-weight: 600; margin: 0.75rem 0 0.5rem; }
        .compose-editor h2 { font-size: 1.25rem; font-weight: 600; margin: 0.6rem 0 0.4rem; }
        .compose-editor h3 { font-size: 1.1rem; font-weight: 600; margin: 0.5rem 0 0.35rem; }
        .compose-editor blockquote { border-left: 3px solid #e2e8f0; padding-left: 0.75rem; color: #64748b; margin: 0.5rem 0; }
        .compose-editor pre { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; padding: 0.5rem 0.75rem; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; overflow-x: auto; }
        .compose-editor ul, .compose-editor ol { padding-left: 1.5rem; margin: 0.35rem 0; }
        .compose-editor hr { border: 0; border-top: 1px solid #e2e8f0; margin: 0.75rem 0; }
        .compose-editor [data-signature] { margin-top: 1.5rem; color: #64748b; }
        .compose-source { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 12px; line-height: 1.6; min-height: 16rem; resize: vertical; }
      </style>

      <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl mx-4"
           x-show="modalOpen"
           x-transition:enter="ease-out duration-200"
           x-transition:enter-start="opacity-0 scale-95 translate-y-2"
           x-transition:enter-end="opacity-100 scale-100 translate-y-0"
           x-transition:leave="ease-in duration-150"
           x-transition:leave-start="opacity-100 scale-100 translate-y-0"
           x-transition:leave-end="opacity-0 scale-95 translate-y-2"
           th:attr="data-signature=${signature} ?: ''"
           x-data="{
             clientId: '',
             mode: 'rich',
             html: '',
             plain: '',
             previewOpen: false,
             templateHtml: '',
             compose() {
               // Wrap the editor body HTML in the selected template (if any).
               // Uses a function replacer so literal $ sequences in the body
               // are not interpreted as regex backreferences.
               const body = this.html || '';
               if (!this.templateHtml) return body;
               return this.templateHtml.replace('{{body}}', () => body);
             },
             includeSignature: ($el.dataset.signature || '').trim().length > 0,
             signature: ($el.dataset.signature || ''),
             templateId: '',
             exec(cmd, value) {
               this.$refs.editor.focus();
               document.execCommand(cmd, false, value || null);
               this.syncFromRich();
             },
             makeLink() {
               const url = prompt('URL:', 'https://');
               if (url) this.exec('createLink', url);
             },
             insertImage() {
               const url = prompt('Image URL:', 'https://');
               if (url) this.exec('insertImage', url);
             },
             setBlock(tag) {
               if (!tag) return;
               this.exec('formatBlock', tag);
             },
             setColor(color) {
               if (!color) return;
               this.exec('foreColor', color);
             },
             setFont(face) {
               if (!face) return;
               this.exec('fontName', face);
             },
             syncFromRich() {
               this.html = this.$refs.editor.innerHTML;
               this.plain = this.$refs.editor.innerText;
             },
             toggleSignature() {
               this.includeSignature = !this.includeSignature;
               this.applySignature();
             },
             applySignature() {
               const editor = this.$refs.editor;
               if (!editor) return;
               const existing = editor.querySelector('[data-signature]');
               if (this.includeSignature) {
                 if (!existing && this.signature.trim().length > 0) {
                   // If the editor has no real content yet, seed a couple of
                   // empty lines so the user has a spot to type above the signature.
                   const bodyEmpty = editor.innerText.trim().length === 0;
                   if (bodyEmpty) {
                     editor.innerHTML = '<div><br></div><div><br></div>';
                   }
                   const wrap = document.createElement('div');
                   wrap.setAttribute('data-signature', '1');
                   wrap.innerHTML = this.signature;
                   editor.appendChild(wrap);
                 }
               } else if (existing) {
                 existing.remove();
               }
               this.syncFromRich();
             },
             toggleMode() {
               if (this.mode === 'rich') {
                 this.syncFromRich();
                 this.mode = 'source';
               } else {
                 this.mode = 'rich';
                 this.$nextTick(() => {
                   this.$refs.editor.innerHTML = this.html;
                   this.syncFromRich();
                 });
               }
             },
             applyTemplate(html) {
               // Templates wrap the body, they don't replace it. Just store
               // the wrapper — compose() injects the current body on every render.
               this.templateHtml = html || '';
               // Auto-reveal the preview so the user can see the styled output.
               if (this.templateHtml) this.previewOpen = true;
             },
             onSubmit() {
               if (this.mode === 'source') {
                 this.$refs.editor.innerHTML = this.html;
               }
               this.syncFromRich();
             }
           }"
           x-init="$nextTick(() => applySignature())">

        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
          <h2 class="text-lg font-semibold">Compose Email</h2>
          <button type="button" @click="$dispatch('close-modal')"
                  class="text-slate-400 hover:text-slate-700 text-xl leading-none">×</button>
        </div>

        <form th:action="@{/emails}" method="post" class="p-6 space-y-5"
              @submit="onSubmit()">

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Client (optional)</label>
              <select name="clientId" x-model="clientId"
                      onchange="if(this.value) { document.getElementById('toAddress').value = this.options[this.selectedIndex].dataset.email || ''; }"
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
                <option value="">— None —</option>
                <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.name}" th:attr="data-email=${c.email}">Client</option>
              </select>
            </div>

            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Template (optional)</label>
              <select x-model="templateId"
                      @change="applyTemplate($event.target.selectedOptions[0]?.dataset.html)"
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
                <option value="">— Blank —</option>
                <option th:each="t : ${emailTemplates}"
                        th:value="${t.id}"
                        th:attr="data-html=${t.html}"
                        th:text="${t.name}">Template</option>
              </select>
            </div>
          </div>

          <div>
            <label for="toAddress" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">To</label>
            <input type="email" id="toAddress" name="toAddress" required autofocus
                   autocomplete="section-to email"
                   placeholder="recipient@example.com"
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">BCC (optional)</label>
            <div x-show="clientId" x-cloak th:if="${!#lists.isEmpty(users)}"
                 class="bg-slate-50 border border-slate-200 rounded-lg p-3 space-y-1.5 mb-2">
              <label th:each="u : ${users}"
                     th:if="${u.client != null}"
                     th:attr="data-client-id=${u.client.id}"
                     x-show="$el.dataset.clientId === clientId"
                     class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
                <input type="checkbox" name="bccUserId" th:value="${u.id}"
                       class="w-4 h-4 rounded border-slate-300 text-[#ea7c28] focus:ring-[#ea7c28]/30">
                <span th:text="${u.name + ' — ' + u.email}">User</span>
              </label>
            </div>
            <input type="text" name="bccManual"
                   autocomplete="off"
                   placeholder="Additional email addresses (comma-separated)"
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>

          <div>
            <label for="subject" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Subject</label>
            <input type="text" id="subject" name="subject" required
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>

          <div>
            <div class="flex items-center justify-between mb-2">
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Message</label>
              <div class="flex items-center gap-3">
                <label class="inline-flex items-center gap-1.5 text-xs text-slate-600 cursor-pointer select-none"
                       th:if="${signature != null and !signature.isEmpty()}">
                  <input type="checkbox" :checked="includeSignature" @change="toggleSignature()"
                         class="w-3.5 h-3.5 rounded border-slate-300 text-[#ea7c28] focus:ring-[#ea7c28]/30">
                  Signature
                </label>
                <button type="button" @click="toggleMode()"
                        class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-slate-900 transition">
                  <i data-lucide="code-2" class="w-3.5 h-3.5"></i>
                  <span x-text="mode === 'rich' ? 'HTML' : 'Rich'"></span>
                </button>
              </div>
            </div>

            <div class="rounded-lg border border-slate-200 bg-white focus-within:ring-2 focus-within:ring-[#ea7c28]/30 focus-within:border-[#ea7c28]">
              <!-- Toolbar -->
              <div class="flex items-center flex-wrap gap-0.5 px-2 py-1.5 border-b border-slate-200 bg-slate-50 rounded-t-lg"
                   x-show="mode === 'rich'">
                <!-- Undo / Redo -->
                <button type="button" @mousedown.prevent @click="exec('undo')" title="Undo (Ctrl+Z)"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="undo-2" class="w-4 h-4"></i>
                </button>
                <button type="button" @mousedown.prevent @click="exec('redo')" title="Redo (Ctrl+Y)"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="redo-2" class="w-4 h-4"></i>
                </button>
                <span class="w-px h-5 bg-slate-200 mx-1"></span>

                <!-- Block style -->
                <select @mousedown.stop
                        @change="setBlock($event.target.value); $event.target.value = ''"
                        class="px-2 py-1 rounded text-xs bg-white border border-slate-200 hover:bg-slate-50 focus:outline-none text-slate-700"
                        title="Paragraph style">
                  <option value="">Style</option>
                  <option value="p">Paragraph</option>
                  <option value="h1">Heading 1</option>
                  <option value="h2">Heading 2</option>
                  <option value="h3">Heading 3</option>
                  <option value="blockquote">Blockquote</option>
                  <option value="pre">Code block</option>
                </select>

                <!-- Font family -->
                <select @mousedown.stop
                        @change="setFont($event.target.value); $event.target.value = ''"
                        class="px-2 py-1 rounded text-xs bg-white border border-slate-200 hover:bg-slate-50 focus:outline-none text-slate-700"
                        title="Font">
                  <option value="">Font</option>
                  <option value="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">System sans-serif</option>
                  <option value="Arial, Helvetica, sans-serif" style="font-family:Arial,Helvetica,sans-serif;">Arial</option>
                  <option value="Verdana, Geneva, sans-serif" style="font-family:Verdana,Geneva,sans-serif;">Verdana</option>
                  <option value="'Trebuchet MS', sans-serif" style="font-family:'Trebuchet MS',sans-serif;">Trebuchet MS</option>
                  <option value="Georgia, 'Times New Roman', serif" style="font-family:Georgia,'Times New Roman',serif;">Georgia</option>
                  <option value="'Times New Roman', Times, serif" style="font-family:'Times New Roman',Times,serif;">Times New Roman</option>
                  <option value="'Courier New', Courier, monospace" style="font-family:'Courier New',Courier,monospace;">Courier New</option>
                </select>
                <span class="w-px h-5 bg-slate-200 mx-1"></span>

                <!-- Inline formatting -->
                <button type="button" @mousedown.prevent @click="exec('bold')" title="Bold (Ctrl+B)"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="bold" class="w-4 h-4"></i>
                </button>
                <button type="button" @mousedown.prevent @click="exec('italic')" title="Italic (Ctrl+I)"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="italic" class="w-4 h-4"></i>
                </button>
                <button type="button" @mousedown.prevent @click="exec('underline')" title="Underline (Ctrl+U)"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="underline" class="w-4 h-4"></i>
                </button>
                <button type="button" @mousedown.prevent @click="exec('strikeThrough')" title="Strikethrough"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="strikethrough" class="w-4 h-4"></i>
                </button>

                <!-- Color -->
                <label class="relative p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition cursor-pointer"
                       title="Text color" @mousedown.prevent>
                  <i data-lucide="palette" class="w-4 h-4"></i>
                  <input type="color"
                         @input="setColor($event.target.value)"
                         class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                </label>
                <span class="w-px h-5 bg-slate-200 mx-1"></span>

                <!-- Alignment -->
                <button type="button" @mousedown.prevent @click="exec('justifyLeft')" title="Align left"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="align-left" class="w-4 h-4"></i>
                </button>
                <button type="button" @mousedown.prevent @click="exec('justifyCenter')" title="Align center"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="align-center" class="w-4 h-4"></i>
                </button>
                <button type="button" @mousedown.prevent @click="exec('justifyRight')" title="Align right"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="align-right" class="w-4 h-4"></i>
                </button>
                <span class="w-px h-5 bg-slate-200 mx-1"></span>

                <!-- Lists & indent -->
                <button type="button" @mousedown.prevent @click="exec('insertUnorderedList')" title="Bulleted list"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="list" class="w-4 h-4"></i>
                </button>
                <button type="button" @mousedown.prevent @click="exec('insertOrderedList')" title="Numbered list"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="list-ordered" class="w-4 h-4"></i>
                </button>
                <button type="button" @mousedown.prevent @click="exec('outdent')" title="Decrease indent"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="indent-decrease" class="w-4 h-4"></i>
                </button>
                <button type="button" @mousedown.prevent @click="exec('indent')" title="Increase indent"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="indent-increase" class="w-4 h-4"></i>
                </button>
                <span class="w-px h-5 bg-slate-200 mx-1"></span>

                <!-- Links, images, rule -->
                <button type="button" @mousedown.prevent @click="makeLink()" title="Insert link"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="link" class="w-4 h-4"></i>
                </button>
                <button type="button" @mousedown.prevent @click="exec('unlink')" title="Remove link"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="link-2-off" class="w-4 h-4"></i>
                </button>
                <button type="button" @mousedown.prevent @click="insertImage()" title="Insert image"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="image" class="w-4 h-4"></i>
                </button>
                <button type="button" @mousedown.prevent @click="exec('insertHorizontalRule')" title="Horizontal rule"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition">
                  <i data-lucide="minus" class="w-4 h-4"></i>
                </button>

                <button type="button" @mousedown.prevent @click="exec('removeFormat')" title="Clear formatting"
                        class="p-1.5 rounded hover:bg-white text-slate-600 hover:text-slate-900 transition ml-auto">
                  <i data-lucide="eraser" class="w-4 h-4"></i>
                </button>
              </div>

              <!-- Rich editor -->
              <div x-ref="editor"
                   x-show="mode === 'rich'"
                   contenteditable="true"
                   @input="syncFromRich()"
                   @blur="syncFromRich()"
                   data-placeholder="Write your message…"
                   class="compose-editor p-4 text-sm text-slate-800"></div>

              <!-- HTML source view -->
              <textarea x-show="mode === 'source'"
                        x-model="html"
                        spellcheck="false"
                        autocomplete="off"
                        class="compose-source w-full p-3 bg-slate-50 text-slate-800 border-0 rounded-b-lg focus:outline-none focus:ring-0"></textarea>
            </div>

            <!-- Hidden inputs submitted with the form. bodyHtml is the body
                 wrapped in the selected template; body is the plain-text fallback. -->
            <input type="hidden" name="bodyHtml" :value="compose()">
            <input type="hidden" name="body" :value="plain">

            <!-- Collapsible live preview -->
            <div class="mt-3 border border-slate-200 rounded-lg overflow-hidden">
              <button type="button" @click="previewOpen = !previewOpen"
                      class="w-full flex items-center justify-between px-4 py-2 bg-slate-50 hover:bg-slate-100 text-xs font-semibold uppercase tracking-wider text-slate-500 transition">
                <span class="inline-flex items-center gap-1.5">
                  <i data-lucide="eye" class="w-3.5 h-3.5"></i>
                  Preview
                  <span x-show="templateHtml" x-cloak
                        class="ml-1 px-1.5 py-0.5 rounded bg-[#ea7c28]/10 text-[#ea7c28] text-[10px] normal-case tracking-normal font-medium">
                    template active
                  </span>
                </span>
                <i data-lucide="chevron-down" class="w-4 h-4 transition"
                   :class="previewOpen ? 'rotate-180' : ''"></i>
              </button>
              <div x-show="previewOpen" x-cloak class="bg-white">
                <iframe sandbox=""
                        :srcdoc="compose()"
                        class="w-full bg-white"
                        style="min-height: 260px;"
                        onload="try { this.style.height = (this.contentWindow.document.documentElement.scrollHeight + 24) + 'px'; } catch(e) {}"></iframe>
              </div>
            </div>
          </div>

          <div class="flex items-center justify-end gap-3 pt-2">
            <button type="button" @click="$dispatch('close-modal')"
                    class="text-sm text-slate-600 hover:text-slate-900 px-4 py-2">Cancel</button>
            <button type="submit"
                    class="bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
              Send
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
