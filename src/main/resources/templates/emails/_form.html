<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="form"
         class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm"
         @click.self="$dispatch('close-modal')">

      <div class="bg-white rounded-xl shadow-2xl w-full max-w-xl mx-4"
           x-show="modalOpen"
           x-transition:enter="ease-out duration-200"
           x-transition:enter-start="opacity-0 scale-95 translate-y-2"
           x-transition:enter-end="opacity-100 scale-100 translate-y-0"
           x-transition:leave="ease-in duration-150"
           x-transition:leave-start="opacity-100 scale-100 translate-y-0"
           x-transition:leave-end="opacity-0 scale-95 translate-y-2">

        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
          <h2 class="text-lg font-semibold">Compose Email</h2>
          <button type="button" @click="$dispatch('close-modal')"
                  class="text-slate-400 hover:text-slate-700 text-xl leading-none">×</button>
        </div>

        <form th:action="@{/emails}" method="post" class="p-6 space-y-5"
              x-data="{ clientId: '' }">

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Client (optional)</label>
            <select name="clientId" x-model="clientId"
                    onchange="if(this.value) { document.getElementById('toAddress').value = this.options[this.selectedIndex].dataset.email || ''; }"
                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
              <option value="">— None —</option>
              <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.name}" th:attr="data-email=${c.email}">Client</option>
            </select>
          </div>

          <div>
            <label for="toAddress" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">To</label>
            <input type="email" id="toAddress" name="toAddress" required autofocus
                   autocomplete="section-to email"
                   placeholder="recipient@example.com"
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">BCC (optional)</label>
            <div x-show="clientId" x-cloak th:if="${!#lists.isEmpty(users)}"
                 class="bg-slate-50 border border-slate-200 rounded-lg p-3 space-y-1.5 mb-2">
              <label th:each="u : ${users}"
                     th:if="${u.client != null}"
                     th:attr="data-client-id=${u.client.id}"
                     x-show="$el.dataset.clientId === clientId"
                     class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
                <input type="checkbox" name="bccUserId" th:value="${u.id}"
                       class="w-4 h-4 rounded border-slate-300 text-[#ea7c28] focus:ring-[#ea7c28]/30">
                <span th:text="${u.name + ' — ' + u.email}">User</span>
              </label>
            </div>
            <input type="text" name="bccManual"
                   autocomplete="off"
                   placeholder="Additional email addresses (comma-separated)"
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>

          <div>
            <label for="subject" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Subject</label>
            <input type="text" id="subject" name="subject" required
                   class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]">
          </div>

          <div>
            <label for="body" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Message</label>
            <textarea id="body" name="body" rows="8" required
                      class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#ea7c28]/30 focus:border-[#ea7c28]"></textarea>
          </div>


          <div class="flex items-center justify-end gap-3 pt-2">
            <button type="button" @click="$dispatch('close-modal')"
                    class="text-sm text-slate-600 hover:text-slate-900 px-4 py-2">Cancel</button>
            <button type="submit"
                    class="bg-[#ea7c28] hover:bg-[#d66f20] text-white text-sm font-medium px-4 py-2 rounded-lg transition">
              Send
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
